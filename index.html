ber": 8, "chapter": "第二章改", "stem": "在允许范围内增加起飞时的襟翼角度，则会使：", "options": [{"letter": "A", "text": "场长限重减小，爬升限重增加"}, {"letter": "B", "text": "场长限重减小，爬升限重减小"}, {"letter": "C", "text": "场长限重增加，爬升限重减小"}, {"letter": "D", "text": "场长限重增加，爬升限重增加"}], "answer": "C", "explanation": "", "answers": []}, {"id": 345, "type": "choice", "label": "单选题", "number": 1, "chapter": "第二章改", "stem": "使用减推力起飞的主要目的是：", "options": [{"letter": "A", "text": "减小发动机磨损和维护成本"}, {"letter": "B", "text": "节省燃油"}, {"letter": "C", "text": "提高起飞限重"}, {"letter": "D", "text": "提升起飞越障能力"}], "answer": "A", "explanation": "", "answers": []}, {"id": 346, "type": "choice", "label": "单选题", "number": 2, "chapter": "第二章改", "stem": "实施假设温度法减推力起飞，必备的前提条件是：", "options": [{"letter": "A", "text": "实际起飞重量等于最大起飞重量"}, {"letter": "B", "text": "实际起飞重量小于最大起飞重量"}, {"letter": "C", "text": "实际起飞重量大于最大起飞重量"}, {"letter": "D", "text": "与实际起飞重量无关"}], "answer": "B", "explanation": "", "answers": []}, {"id": 347, "type": "choice", "label": "单选题", "number": 3, "chapter": "第二章改", "stem": "使用假设温度法减推力起飞，所减推力的最大值不得超过（ ），减推力后的油门不得小于最大上升油门。这种限制也称为最大减推力限制的最大假设温度。", "options": [{"letter": "A", "text": "15%"}, {"letter": "B", "text": "25%"}, {"letter": "C", "text": "30%"}, {"letter": "D", "text": "35%"}], "answer": "B", "explanation": "", "answers": []}, {"id": 348, "type": "choice", "label": "单选题", "number": 4, "chapter": "第二章改", "stem": "在使用假设温度法减推力起飞时，假设温度与实际温度的关系是：", "options": [{"letter": "A", "text": "假设温度低于实际温度"}, {"letter": "B", "text": "假设温度等于实际温度"}, {"letter": "C", "text": "假设温度高于实际温度"}, {"letter": "D", "text": "假设温度与实际温度无关"}], "answer": "C", "explanation": "", "answers": []}, {"id": 349, "type": "choice", "label": "单选题", "number": 5, "chapter": "第二章改", "stem": "在使用灵活温度法减推力起飞时，所选择的灵活温度必须满足：", "options": [{"letter": "A", "text": "灵活温度 < 实际温度，灵活温度 < 平台温度"}, {"letter": "B", "text": "灵活温度 > 实际温度，灵活温度 > 平台温度"}, {"letter": "C", "text": "灵活温度 < 实际温度，灵活温度 > 平台温度"}, {"letter": "D", "text": "灵活温度 > 实际温度，灵活温度 < 平台温度"}], "answer": "B", "explanation": "", "answers": []}, {"id": 350, "type": "choice", "label": "多选题", "number": 6, "chapter": "第二章改", "stem": "在污染跑道起飞，可以使用的减推力方案有：", "options": [{"letter": "A", "text": "使用灵活推力(假设温度法)"}, {"letter": "B", "text": "降低额定功率"}], "answer": "B", "explanation": "", "answers": []}, {"id": 351, "type": "choice", "label": "单选题", "number": 1, "chapter": "第二章改", "stem": "轮胎与道面完全脱离的滑水，一般常在积水层较深且滑跑速度较大时产生，这种滑水现象称为：", "options": [{"letter": "A", "text": "粘性滑水"}, {"letter": "B", "text": "动态滑水"}, {"letter": "C", "text": "橡胶还原滑水"}], "answer": "B", "explanation": "动态滑水：是指轮胎与道面完全脱离的滑水，一般常在积水层较深且滑跑速度较大时产生。动态滑水将导致机轮转速大大下降甚至会停转和反转，摩擦力急剧减小，方向控制能力显著下降甚至失去。", "answers": []}, {"id": 352, "type": "choice", "label": "单选题", "number": 2, "chapter": "第二章改", "stem": "当轮胎较长时间停转时，在湿或污染跑道上摩擦产生的高温将使橡胶变软、发粘并进而产生还原现象，同时积水层受热产生的蒸汽会把轮胎抬离道面。这种滑水现象称为：", "options": [{"letter": "A", "text": "粘性滑水"}, {"letter": "B", "text": "动态滑水"}, {"letter": "C", "text": "橡胶还原滑水"}], "answer": "C", "explanation": "橡胶还原滑水：当轮胎较长时间停转时，在湿或污染跑道上摩擦产生的高温将使橡胶变软、发粘并进而产生还原现象，同时积水层受热产生的蒸汽会把轮胎抬离道面。橡胶还原滑水将导致机轮锁死，轮胎的摩擦力极小，飞机的方向控制能力将完全失去。", "answers": []}, {"id": 353, "type": "choice", "label": "单选题", "number": 3, "chapter": "第二章改", "stem": "道面与轮胎仍有接触的滑水，通常在积水层较浅时产生，这种滑水现象称为：", "options": [{"letter": "A", "text": "粘性滑水"}, {"letter": "B", "text": "动态滑水"}, {"letter": "C", "text": "橡胶还原滑水"}], "answer": "A", "explanation": "粘性滑水：是指道面与轮胎仍有接触的滑水，通常在积水层较浅时产生。粘性滑水导致的后果主要是摩擦力减小、机轮转速下降。", "answers": []}, {"id": 354, "type": "fill", "label": "填空题", "number": 1, "chapter": "第二章改", "stem": "一架737-600飞机计划在成都双流国际机场02号跑道起飞，气温20℃，静风，起飞襟翼5，空调自动，防冰关。 根据图[S-2-7]，试确定：（计算结果均使用整数） (1) 正常起飞的最大起飞重量 = kg； (2) 正常起飞使用最大起飞重量时，V1 = kt，VR = kt，V2 = kt。", "options": [], "answer": "65090、131、132、139", "explanation": "根据条件，从S-3-7的起飞分析表中可读出审定限重65090kg，爬升限重66300kg，障碍物限重71300kg，V1/VR/V2为131/132/139kt。 在以上三个限重中取最小值作为最大起飞重量，即65090kg，起飞速度不变，即V1/VR/V2 = 131/132/139kt。", "answers": ["65090", "131", "132", "139"]}, {"id": 355, "type": "fill", "label": "填空题", "number": 2, "chapter": "第二章改", "stem": "一架737-600飞机计划在成都双流国际机场02号跑道起飞，气温31℃，逆风10kt，起飞襟翼5，空调自动，防冰关。 根据图[S-2-7]，试确定：（计算结果均使用整数） (1) 使用改进爬升起飞的最大起飞重量 = kg； (2) 使用改进爬升起飞使用最大起飞重量时， V1 = kt， VR = kt， V2 = kt。 (3) 如果实际起飞重量为60000kg，使用减推力进行改进爬升起飞程序，则 假设温度= ℃， V1 = kt； VR = kt； V2 = kt。", "options": [], "answer": "65090、134、136、142、47、153、157、163", "explanation": "根据S-3-7起飞分析表，以及风温条件，得到最大审定限重为65090kg，改进爬升时的起飞限重为65100kg，V1/VR/V2为134/136/142kt。 最大起飞重量必须小于最大审定限重，因此改进爬升的起飞限重为65090kg，V1/VR/V2为134/136/142kt。 如果60000kg，则逆风10kt时，找改进爬升限重包含60000kg的相邻温度区间为47~49℃，选取原则为选择较低温度问假想温度，因此直接选择47℃作为假设温度。V1/VR/V2为153/157/163kt。", "answers": ["65090", "134", "136", "142", "47", "153", "157", "163"]}, {"id": 356, "type": "fill", "label": "填空题", "number": 1, "chapter": "第二章改", "stem": "一架A319飞机计划在成都双流国际机场02号跑道起飞，湿跑道，QNH 1013hPa，气温10℃，静风，起飞襟翼CONF 2，空调开，防冰关。 根据图[S-2-9]，试确定：（计算结果均使用整数） (1) 最大起飞重量 = kg； (2) 使用最大起飞重量时，V1 = kt，VR = kt，V2 = kt。", "options": [], "answer": "75200、151、158、163", "explanation": "根据条件，从S-2-9的起飞分析表中可读出起飞限重75600kg，V1/VR/V2为160/160/165kt。 根据湿跑道，进行修正，重量-400kg，速度-9/-2/-2kt， 则修正的最大起飞重量为75200kg，V1/VR/V2 = 151/158/163kt。检查最小速度，可以起飞。", "answers": ["75200", "151", "158", "163"]}, {"id": 357, "type": "fill", "label": "填空题", "number": 2, "chapter": "第二章改", "stem": "一架A320飞机计划在南京禄口国际机场07号跑道起飞，实际起飞重量76200kg，干跑道，QNH 1003hPa，气温28℃，逆风10kt，起飞襟翼CONF 1+F，空调关，防冰关。 根据图[S-2-10]，试确定：（计算结果均使用整数） (1) 使用减推力起飞，可选的最大灵活温度 = ℃； (2) 使用减推力起飞，设置为最大灵活温度后的V1 = kt，VR = kt，V2 = kt。", "options": [], "answer": "50、123、145、148", "explanation": "根据条件，从S-2-10的起飞分析表中可读出修正后的起飞限重(84.5 + 0.8 - 1.5) * 1000 = 83800kg，修正后的起飞速度为158/168/169kt。 实际起飞重量76200kg，说明可以考虑减推力起飞。 在表中襟翼CONF 1+F和逆风10kt，查找实际起飞重量76200kg的温度，52℃，作为最大灵活温度，对应的起飞速度为V1/VR/V2 = 123/145/148kt 这里要注意，对空客机型进行确定灵活温度时，在QNH和空调的修正项目里不修正起飞速度，只修正灵活温度。 空调关，进行修正，灵活温度增量+0，起飞速度不修正； 根据QNH1003hPa，比1013hPA低10hPa，进行修正，灵活温度增量-2，起飞速度不修正； 最终，灵活温度增量-2； 则修正后的灵活温度为52-2=50℃，V1/VR/V2 = 123/145/148kt。 检查大于最小速度（116/122/125），检查灵活温度大于Tref（47℃），可以减推力起飞。", "answers": ["50", "123", "145", "148"]}, {"id": 358, "type": "fill", "label": "填空题", "number": 3, "chapter": "第二章改", "stem": "一架A320飞机计划在南京禄口国际机场07号跑道起飞，实际起飞重量76200kg，干跑道，QNH 1003hPa，气温28℃，逆风10kt，起飞襟翼CONF 1+F，空调关，防冰关。 根据图[S-2-10]，试确定：（计算结果均使用整数） (1) 最大起飞重量 = kg； (2) 最大起飞重量时的V1 = kt，VR = kt， V2 = kt。 (3) 使用减推力起飞，可选的最大灵活温度 = ℃； (4) 使用减推力起飞，设置为最大灵活温度后的V1 = kt，VR = kt，V2 = kt。", "options": [], "answer": "83800、158、168、169、50、123、145、148", "explanation": "根据条件，从S-2-10的起飞分析表中可读出修正后的起飞限重(84.5 + 0.8 - 1.5) * 1000 = 83800kg，修正后的起飞速度为158/168/169kt。 实际起飞重量76200kg，说明可以考虑减推力起飞。 在表中襟翼CONF 1+F和逆风10kt，查找实际起飞重量76200kg的温度，52℃，对应的起飞速度为V1/VR/V2 = 123/145/148kt 这里要注意，对空客机型进行确定灵活温度时，在QNH和空调的修正项目里不修正起飞速度，只修正灵活温度。 空调关，进行修正，灵活温度增量+0，起飞速度不修正； 根据QNH1003hPa，比1013hPA低10hPa，进行修正，灵活温度增量-2，起飞速度不修正； 最终，灵活温度增量-2； 则修正后的灵活温度为52-2=50℃，V1/VR/V2 = 123/145/148kt。 检查大于最小速度（116/122/125），检查灵活温度大于Tref（47℃），可以减推力起飞。", "answers": ["83800", "158", "168", "169", "50", "123", "145", "148"]}, {"id": 359, "type": "fill", "label": "填空题", "number": 1, "chapter": "第二章改", "stem": "一架A321飞机计划在成都天府国际机场01号跑道起飞，干跑道，QNH 1023hPa，气温20℃，静风，起飞襟翼CONF 2，空调开，防冰关。 根据该飞机的起飞限重表[S-2-13]，试确定：（计算结果均取整数） (1) 所允许的最大起飞重量 = kg（暂不判断最大审定起飞重量）； (2) 使用最大起飞重量时，V1 = kt，VR = kt，V2 = kt。", "options": [], "answer": "94180、161、166、166", "explanation": "根据条件，从[S-2-13]的起飞分析表中可读出起飞限重91.1t，气温32℃，V1/VR/V2为161/165/165kt，重量外推梯度为60/280 KG/℃ 从表中下方读出参考温度Tref = 24℃ 根据实际气温为20℃，进行重量外推计算得到起飞限重 = 91.1 + (24 - 20) * 0.06 + (32 - 24) * 0.28 = 93.58 t 根据QNH 1023hPa，进行修正，重量+0.6t，速度0/+1/+1 kt， 则修正后的最大起飞重量为94.18 t (94180 kg)，V1/VR/V2 = 161/166/166 kt。 最后检查最小速度，满足条件。", "answers": ["94180", "161", "166", "166"]}, {"id": 360, "type": "fill", "label": "填空题", "number": 2, "chapter": "第二章改", "stem": "一架A320飞机计划在南京禄口国际机场25号跑道起飞，湿跑道，QNH 1023hPa，气温25℃，逆风10kt，起飞襟翼CONF 1+F，空调开，防冰关。 根据该飞机的起飞限重表[S-2-12]，试确定：（计算结果均取整数） (1) 所允许的最大起飞重量 = kg（暂不判断最大审定起飞重量）； (2) 使用最大起飞重量时，V1 = kt，VR = kt，V2 = kt。", "options": [], "answer": "85930、154、165、166", "explanation": "根据条件，从[S-2-12]的起飞分析表中可读出起飞限重84.2t，气温36℃，V1/VR/V2为157/165/166kt，重量外推梯度为230/*** KG/℃ 从表中下方读出参考温度Tref = 47℃ 根据实际气温为25℃，进行重量外推计算得到起飞限重 = 84.2 + (36 - 25) * 0.23 = 86.73 t 根据湿跑道，修正量为：重量-0.9t，速度-4/-1/-1/-1 kt 根据QNH 1023hPa，修正量为：重量+0.1t，速度+1/+1/+1 kt， 则修正后的最大起飞重量为86.73 -0.9 + 0.1 = 85.93 t (85930 kg)，V1/VR/V2 = 154/165/166 kt。 最后检查最小速度，满足条件。", "answers": ["85930", "154", "165", "166"]}, {"id": 361, "type": "fill", "label": "填空题", "number": 3, "chapter": "第二章改", "stem": "一架A320飞机计划在南京禄口国际机场25号跑道起飞，实际起飞重量75500kg，干跑道，QNH 1003hPa，气温30℃，逆风10kt，起飞襟翼CONF 2，空调开，防冰关。 根据该飞机的起飞限重表[S-2-12]，试确定：（计算结果均使用整数） (1) 使用减推力起飞，可选取的最大灵活温度 = ℃； (2) 使用减推力起飞，设置最大灵活温度后的V1 = kt，VR = kt，V2 = kt。", "options": [], "answer": "50、120、142、144", "explanation": "根据条件，从S-2-12的起飞分析表中可大致估计出该条件下的最大起飞重量至少为80t，大于实际起飞重量75.5t，所以可以考虑使用灵活温度法减推力。 （有兴趣的同学，可以自己算一下准确的最大起飞重量） 根据条件，从S-2-12表中读出起飞重量为75.6t（取最接近实际起飞重量75.5t的较高重量值）对应的最大灵活温度53℃，V1/VR/V2 = 120/142/144 kt 这里要注意，对空客机型进行确定灵活温度时，在QNH和空调的修正项中，不修正起飞速度，只修正灵活温度。 根据QNH1003hPa，比1013hPA低10hPa，进行修正，灵活温度增量-3℃， 则修正后的灵活温度为53-3=50℃，V1/VR/V2 = 120/142/144kt。 检查灵活温度为50℃，高于参考温度Tref=47℃， 检查起飞速度大于最小速度（116/122/125）， 因此可以使用灵活推力起飞。", "answers": ["50", "120", "142", "144"]}, {"id": 362, "type": "choice", "label": "单选题", "number": 1, "chapter": "第五章改", "stem": "运输类飞机起飞场道结束时和着陆过跑道头时的高度分别是：", "options": [{"letter": "A", "text": "15ft, 35ft"}, {"letter": "B", "text": "35ft, 15ft"}, {"letter": "C", "text": "50ft, 35ft"}, {"letter": "D", "text": "35ft, 50ft"}], "answer": "D", "explanation": "", "answers": []}, {"id": 363, "type": "choice", "label": "单选题", "number": 2, "chapter": "第五章改", "stem": "大型运输机着陆阶段是指飞机从( )ft过跑道头，速度不低于( )，经下降拉平接地着陆滑跑直到全停的过程。", "options": [{"letter": "A", "text": "50，1.2VS"}, {"letter": "B", "text": "1500， 1.25VS"}, {"letter": "C", "text": "35，1.3VS"}, {"letter": "D", "text": "50，1.3VS"}], "answer": "D", "explanation": "过跑道头速度VREF，即50ft高度过跑道头速度，不能低于1.3VS，其中VS就是VSFAR，注意与VS1g的区别(PPT中有)。", "answers": []}, {"id": 364, "type": "choice", "label": "单选题", "number": 3, "chapter": "第五章改", "stem": "飞机的失速速度有FAR失速速度和1g失速速度两种，二者相比：", "options": [{"letter": "A", "text": "前者大于后者"}, {"letter": "B", "text": "后者大于前者"}, {"letter": "C", "text": "没有差别"}, {"letter": "D", "text": "不一定"}], "answer": "B", "explanation": "飞机平飞，迎角逐渐增加时： VS1g是升力系数达到最大值，即将开始减小时的速度，此时ny=1； VSFAR是升力系数已经开始减小时的速度，此时ny<1，而且阻力进一步增加，所以这时的速度比VS1g小，即VSFAR", "answers": []}, {"id": 365, "type": "choice", "label": "单选题", "number": 4, "chapter": "第五章改", "stem": "对于给定质量的双发飞机在着陆构型时的失速速度VS为100kt，在最后的进近阶段飞行员保持的进场速度必须大于等于：", "options": [{"letter": "A", "text": "130kt"}, {"letter": "B", "text": "115kt"}, {"letter": "C", "text": "123kt"}, {"letter": "D", "text": "120kt"}], "answer": "A", "explanation": "在无风情况下，最后进近速度Vapp等于过跑道头速度VREF，两者均要大于等于1.3VS0(着陆构型失速速度，它也是一种VSFAR参考失速速度，只不过要求着陆构型)", "answers": []}, {"id": 366, "type": "choice", "label": "单选题", "number": 5, "chapter": "第五章改", "stem": "飞机在着陆时可以选择25°襟翼或35°襟翼。如果选择35°襟翼着陆，和选择25°襟翼相比, 飞机的：", "options": [{"letter": "A", "text": "着陆距离增大，复飞性能变好"}, {"letter": "B", "text": "着陆距离减小，复飞性能变差"}, {"letter": "C", "text": "着陆距离减小，复飞性能不变"}, {"letter": "D", "text": "着陆距离减小，复飞性能变好"}], "answer": "B", "explanation": "襟翼角度越大，最大升力系数越大，使得着陆接地速度越小，同时阻力系数越大，有效缩短着陆距离；但是，阻力系数越大，使得复飞爬升梯度减小，即复飞性能变差。", "answers": []}, {"id": 367, "type": "choice", "label": "单选题", "number": 6, "chapter": "第五章改", "stem": "已知某波音737-300飞机在着陆时的进场参考速度为VREF。已知着陆前通播(ATIS)预报的逆风8kt。则该飞机人工进近时的进近速度Vapp为：", "options": [{"letter": "A", "text": "VREF+0kt"}, {"letter": "B", "text": "VREF+4kt"}, {"letter": "C", "text": "VREF+5kt"}, {"letter": "D", "text": "VREF+8kt"}], "answer": "C", "explanation": "对B737-300这个机型： 当有顺风时，Vapp=VREF； 当逆风分量小于10kt时，Vapp=VREF+5kt； 当逆风分量超过10kt时，Vapp=VREF+逆风分量/2+阵风修正，其中阵风修正=阵风-逆风分量。 注意，Vapp有最大值限制：Vapp<=VREF+20kt。", "answers": []}, {"id": 368, "type": "choice", "label": "单选题", "number": 7, "chapter": "第五章改", "stem": "对某B737-300飞机，逆风8kt和顺风6kt时的人工进近速度VAPP分别为：", "options": [{"letter": "A", "text": "VREF+8kt，VREF-6kt"}, {"letter": "B", "text": "VREF+4，VREF"}, {"letter": "C", "text": "VREF+4 ，VREF-3"}, {"letter": "D", "text": "VREF+5，VREF"}], "answer": "D", "explanation": "对B737-300这个机型： 当有顺风时，Vapp=VREF； 当逆风分量小于10kt时，Vapp=VREF+5kt； 当逆风分量超过10kt时，Vapp=VREF+逆风分量/2+阵风修正，其中阵风修正=阵风-逆风分量。 注意，Vapp有最大值限制：Vapp<=VREF+20kt。", "answers": []}, {"id": 369, "type": "choice", "label": "单选题", "number": 8, "chapter": "第五章改", "stem": "已知某波音737-300飞机在着陆时的进场参考速度为VREF。已知着陆前通播(ATIS)预报的逆风14kt，阵风20kt。则该飞机人工进近时的进近速度Vapp为：", "options": [{"letter": "A", "text": "VREF+0kt"}, {"letter": "B", "text": "VREF + 13kt"}, {"letter": "C", "text": "VREF+14kt"}, {"letter": "D", "text": "VREF+20kt"}], "answer": "B", "explanation": "对B737-300这个机型： 当有顺风时，Vapp=VREF； 当逆风分量小于10kt时，Vapp=VREF+5kt； 当逆风分量超过10kt时，Vapp=VREF+逆风分量/2+阵风修正，其中阵风修正=阵风-逆风分量。 注意，Vapp有最大值限制：Vapp<=VREF+20kt。 这道题，Vapp=VREF+7+(20-14)=VREF+13kt", "answers": []}, {"id": 370, "type": "choice", "label": "单选题", "number": 9, "chapter": "第五章改", "stem": "已知某机场02号跑道长度3600m，净空道300m，停止道100m，跑道入口内移200m。某机型干道面审定着陆距离是1800m。 则02号跑道可用着陆距离是：", "options": [{"letter": "A", "text": "3600"}, {"letter": "B", "text": "3500"}, {"letter": "C", "text": "3400"}, {"letter": "D", "text": "3100"}], "answer": "C", "explanation": "在考虑跑道内移时，可用着陆距离等于公布的跑道长度减去跑道内移距离。", "answers": []}, {"id": 371, "type": "choice", "label": "单选题", "number": 10, "chapter": "第五章改", "stem": "已知某机场02号跑道长度3600m，净空道300m，停止道100m，跑道入口内移200m。某机型干道面审定着陆距离是1800m。 则02号跑道干道面所需着陆距离是：", "options": [{"letter": "A", "text": "3600"}, {"letter": "B", "text": "3500"}, {"letter": "C", "text": "3100"}, {"letter": "D", "text": "3000"}], "answer": "D", "explanation": "干跑道所需着陆距离 = 审定着陆距离/0.6或*1.67", "answers": []}, {"id": 372, "type": "choice", "label": "单选题", "number": 11, "chapter": "第五章改", "stem": "已知条件如下： (a)某机场跑道长度为3000m；安全道长度60m，净空道长度为300m，由于跑道施工，跑道入口内移了100m； (b)某机型的干跑道审定全发起飞滑跑距离为2600米，审定全发起飞距离为3000米，一发失效后审定的起飞滑跑距离为2900米，一发失效后审定的起飞距离为3300，全发的中断起飞距离为3000m，一发失效后审定的中断起飞距离为3060米，干道面审定着陆距离为1600m。起飞过程中均不考虑预滑段。 请问该机型在该机场湿跑道条件下的所需着陆距离为：", "options": [{"letter": "A", "text": "3073m"}, {"letter": "B", "text": "2672m"}, {"letter": "C", "text": "2985"}, {"letter": "D", "text": "3000"}], "answer": "A", "explanation": "干跑道所需着陆距离 = 审定着陆距离*1.67 = 1600 * 1.67 = 2672m； 湿跑道所需着陆距离 = 干跑道着陆距离*1.15 = 2672 * 1.15 = 3072.8m。 因此答案为3073m。", "answers": []}, {"id": 373, "type": "choice", "label": "单选题", "number": 12, "chapter": "第五章改", "stem": "签派放行飞机时应满足可用着陆距离( )所需着陆距离。", "options": [{"letter": "A", "text": "小于或等于"}, {"letter": "B", "text": "一般不作硬性规定"}, {"letter": "C", "text": "大于或等于"}, {"letter": "D", "text": "视天气条件而定"}], "answer": "C", "explanation": "", "answers": []}, {"id": 374, "type": "choice", "label": "单选题", "number": 13, "chapter": "第五章改", "stem": "进场高度偏高和速度偏大的危害性表现之一是接地点前移，易形成( )，导致( )。", "options": [{"letter": "A", "text": "目测低，着陆距离缩短"}, {"letter": "B", "text": "目测低，着陆距离增长"}, {"letter": "C", "text": "目测高，着陆距离缩短"}, {"letter": "D", "text": "目测高，着陆距离增长"}], "answer": "D", "explanation": "", "answers": []}, {"id": 375, "type": "choice", "label": "单选题", "number": 14, "chapter": "第五章改", "stem": "逆风着陆，则会使着陆滑跑距离：", "options": [{"letter": "A", "text": "增长"}, {"letter": "B", "text": "缩短"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不能确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 376, "type": "choice", "label": "单选题", "number": 15, "chapter": "第五章改", "stem": "上坡着陆，则会使着陆距离：", "options": [{"letter": "A", "text": "增长"}, {"letter": "B", "text": "缩短"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不能确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 377, "type": "choice", "label": "单选题", "number": 1, "chapter": "第五章改", "stem": "为了减小着陆距离，反推的使用时机应该是：", "options": [{"letter": "A", "text": "接地后立即使用"}, {"letter": "B", "text": "接地前使用"}, {"letter": "C", "text": "当主轮刹车完全工作后使用"}, {"letter": "D", "text": "干道面上不可使用"}], "answer": "C", "explanation": "当飞机两点接地，且前轮也接地后，这时要第一时间使用刹车，刹车开始完全工作后，才能使用反推。", "answers": []}, {"id": 378, "type": "choice", "label": "单选题", "number": 2, "chapter": "第五章改", "stem": "干道面着陆时使用自动刹车，反推对着陆距离影响不大的原因是：", "options": [{"letter": "A", "text": "反推推力低"}, {"letter": "B", "text": "自动刹车是通过自动调整刹车压力来保持预设减速度"}, {"letter": "C", "text": "减速板作用增加"}, {"letter": "D", "text": "防滞系统效果好"}], "answer": "B", "explanation": "自动刹车是保持选定的减速率自动选择刹车档位，或者自动调节刹车片上的压力，有助于减轻刹车片的磨损，降低机组工作负荷。同时，自动刹车延迟时间比人工刹车时间更短，数据统计显示能够缩短1.67秒。 因此，自动刹车本质上就是使得飞机达到固定的减速率，也就是固定的减速度，另外刹车在干道面上的效果非常明显，也就是说，使用与不使用反推都是一样的减速度，只不过反推可以减轻刹车片的磨损(减轻自动刹车系统的压力)。因此，干道面上使用自动刹车，反推的效果并不明显。 而在湿道面上，使用自动刹车，即要达到固定的减速率，由于刹车效率在湿道面上会降低，因此反推的作用就明显了，能够有效帮助自动刹车系统达到指定的减速率。", "answers": []}, {"id": 379, "type": "choice", "label": "单选题", "number": 3, "chapter": "第五章改", "stem": "在现代运输机的制动系统中，扰流板的主要作用是：", "options": [{"letter": "A", "text": "增加阻力(增阻)"}, {"letter": "B", "text": "减小升力(卸升)"}, {"letter": "C", "text": "增加空气阻力"}, {"letter": "D", "text": "减小机轮上的正压力"}], "answer": "B", "explanation": "扰流板的基本作用在于通过破坏机翼上表面绕流从而减小升力，并增大气动阻力。从其减速的效果来看，最关键的作用还是破坏机翼升力，提高作用于机轮上的正压力而增强刹车的效果。 即，扰流板在着陆中的最大作用在于减小机翼升力从而提高刹车效率。", "answers": []}, {"id": 380, "type": "choice", "label": "单选题", "number": 4, "chapter": "第五章改", "stem": "刹车防滞系统失效，会( )飞机的着陆距离。", "options": [{"letter": "A", "text": "增大"}, {"letter": "B", "text": "缩短"}, {"letter": "C", "text": "不影响"}, {"letter": "D", "text": "视道面情况而定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 381, "type": "choice", "label": "多选题", "number": 5, "chapter": "第五章改", "stem": "在干道面上用自动刹车着陆时，若使用反推，则：", "options": [{"letter": "A", "text": "可以显著缩短着陆距离"}, {"letter": "B", "text": "不能显著缩短着陆距离"}, {"letter": "C", "text": "可以降低刹车的磨损"}, {"letter": "D", "text": "可以一直使用直到飞机完全停止"}], "answer": "BC", "explanation": "干跑道上，使用自动刹车(飞机为保持指定的减速度自动选择刹车档位，等于是自动挡)，这时反推的减速作用不明显，但可以有效降低刹车磨损。 为了减少发动机损耗和防止地面杂物吸入发动机，很多航空公司往往会选择在干跑道上不使用反推着陆。 而在湿跑道上着陆时，刹车效果降低，但反推的减速作用将明显提高。 最后，一般要求60kt以下时必须解除反推(反推要在较高速度下才能使用，为的是避免低速度下发动机吸入跑道表面可能出现的杂物)。", "answers": []}, {"id": 382, "type": "fill", "label": "填空题", "number": 6, "chapter": "第五章改", "stem": "现代大型运输机在着陆期间的主要减阻措施有： 、 和 。", "options": [], "answer": "刹车及防滞系统、扰流板、反推", "explanation": "", "answers": ["刹车及防滞系统", "扰流板", "反推"]}, {"id": 383, "type": "choice", "label": "单选题", "number": 1, "chapter": "第五章改", "stem": "在复飞爬升梯度限制的最大着陆重量中，( )阶段可不考虑一发失效情况，且规章要求的最小梯度为( )。", "options": [{"letter": "A", "text": "进近复飞，3.2%"}, {"letter": "B", "text": "进近复飞，2.1%"}, {"letter": "C", "text": "着陆复飞，2.1%"}, {"letter": "D", "text": "着陆复飞，3.2%"}], "answer": "D", "explanation": "注意进近复飞和着陆复飞的区别，包括构型、发动机失效状态、爬升梯度要求等。", "answers": []}, {"id": 384, "type": "choice", "label": "单选题", "number": 2, "chapter": "第五章改", "stem": "襟翼偏角越小，跑道限重( )，爬升限重( )。", "options": [{"letter": "A", "text": "越小，越大"}, {"letter": "B", "text": "越大，越小"}, {"letter": "C", "text": "越大，越大"}, {"letter": "D", "text": "越小，越小"}], "answer": "A", "explanation": "襟翼偏角越小，起飞滑跑时，所需起飞距离就越长，跑道长度限制的起飞重量就越小，即限重越小(也就是说飞机重量必须轻一些才能保证不会冲出跑道)； 着陆滑跑，与起飞滑跑的情况相同，也是跑道长度限制的着陆重量限重越小。 对于爬升，无论是起飞阶段的初始爬升还是着陆阶段的复飞爬升，襟翼偏度越小，爬升梯度越大(因为空气阻力越小)，则爬升梯度限制的最大起飞重量和最大着陆重量越大(也就是说，爬升性能更好了，就可以更容易满足规章要求的最小爬升梯度限制，允许飞机装更多的旅客货物或燃油进行起飞和着陆) 注意，必须要能理解：限重越小，则表示对飞机重量的限制就越严格。", "answers": []}, {"id": 385, "type": "choice", "label": "单选题", "number": 3, "chapter": "第五章改", "stem": "着陆时襟翼偏度越大，会使着陆距离( )，复飞时爬升梯度( )。", "options": [{"letter": "A", "text": "越长，越大"}, {"letter": "B", "text": "越短，越小"}, {"letter": "C", "text": "越短，越大"}, {"letter": "D", "text": "越长，越小"}], "answer": "B", "explanation": "", "answers": []}, {"id": 386, "type": "choice", "label": "单选题", "number": 4, "chapter": "第五章改", "stem": "机场气温和标高越高，则着陆距离( )，复飞时的爬升梯度( )。", "options": [{"letter": "A", "text": "越长，越大"}, {"letter": "B", "text": "越短，越小"}, {"letter": "C", "text": "越短，越大"}, {"letter": "D", "text": "越长，越小"}], "answer": "D", "explanation": "", "answers": []}, {"id": 387, "type": "fill", "label": "填空题", "number": 8, "chapter": "第五章改", "stem": "已知飞机的快速过站重量检查表[S-5-4]，着陆时机场条件如下： 气压高度3000ft， 实际温度是20℉， 下坡1%， 逆风10kt， 使用襟翼30。 则快速过站限制的最大着陆重量= kg。", "options": [], "answer": "54950", "explanation": "襟翼30，机场气压高度3000ft，实际温度20℉，可查表得快速过站最大着陆重量=55000kg。 下坡1%，减小重量1150kg； 逆风10kt，增加重量1100kg； 则修正后的快速过站最大着陆重量=55000-1150+1100=54950kg。", "answers": ["54950"]}, {"id": 388, "type": "choice", "label": "多选题", "number": 1, "chapter": "第六章", "stem": "如果飞机的起飞重量增加，带来的后果有：", "options": [{"letter": "A", "text": "起飞滑跑距离增长，起飞加速度减小"}, {"letter": "B", "text": "离地表速增大"}, {"letter": "C", "text": "离地真空速增大"}, {"letter": "D", "text": "离地后初始爬升梯度减小，爬升率减小"}], "answer": "ABCD", "explanation": "只要重量增加，起飞时不管是IAS、TAS还是GS，都会增大。", "answers": []}, {"id": 389, "type": "choice", "label": "多选题", "number": 2, "chapter": "第六章", "stem": "重量大幅增加后的飞机在巡航时，会发生：", "options": [{"letter": "A", "text": "低速抖振速度增加，高速抖振速度减小"}, {"letter": "B", "text": "最大巡航高度降低"}, {"letter": "C", "text": "远程巡航速度增加，长航程巡航速度增加"}, {"letter": "D", "text": "远程巡航高度增加，单位时间油耗增加"}], "answer": "ABC", "explanation": "", "answers": []}, {"id": 390, "type": "choice", "label": "多选题", "number": 3, "chapter": "第六章", "stem": "如果飞机的预计着陆重量增加，带来的后果有：", "options": [{"letter": "A", "text": "着陆滑跑距离增长"}, {"letter": "B", "text": "着陆参考速度VREF增大"}, {"letter": "C", "text": "接地时的表速增大，刹车装置损耗大幅增加"}, {"letter": "D", "text": "接地时的地速增大，起落装置容易受损"}], "answer": "ABCD", "explanation": "", "answers": []}, {"id": 391, "type": "choice", "label": "多选题", "number": 4, "chapter": "第六章", "stem": "飞机的重量大幅增加时，其飞行性能特征有：", "options": [{"letter": "A", "text": "机动能力下降，并且容易失速"}, {"letter": "B", "text": "失速速度减小"}, {"letter": "C", "text": "稳定性提高"}, {"letter": "D", "text": "操纵性变差"}], "answer": "ACD", "explanation": "飞机越重，则受到扰动时，更不容易使得飞机姿态发生变化，因此稳定性提高。但相对应的，稳定性提高，则必然使操纵性下降，即飞机不容易改变姿态。 重量越重，失速速度增加，当飞机做机动飞行时，例如转弯，失速速度进一步增加，则更加容易失速。", "answers": []}, {"id": 392, "type": "choice", "label": "多选题", "number": 5, "chapter": "第六章", "stem": "飞机重心过于靠前，导致的后果有：", "options": [{"letter": "A", "text": "空中最小操纵速度增大"}, {"letter": "B", "text": "起飞过程中，抬前轮时杆力过重"}, {"letter": "C", "text": "相同条件下选择的巡航速度减小"}, {"letter": "D", "text": "失速速度增加"}], "answer": "BD", "explanation": "重心前移，则使主操纵面(主要指升降舵与方向舵)到重心的距离变长，即操纵力臂增长。因此当一发失效时为了维持飞机坡度5度以内并且保持航向，所需要的空气动力减小(或者说力臂长了，更省力)，即所需动压减小，所以空中最小操纵速度(CAS)减小。 重心前移，平飞阻力增加(书上有解释)，同时所需升力增加，导致失速速度增加(从平飞所需推力曲线中分析也可以得到相同结论)。阻力增加同时导致平飞所需速度增加(其实除了最大平飞速度减小以外，其他速度都会增加，例如有利速度、远航速度等)。", "answers": []}, {"id": 393, "type": "choice", "label": "单选题", "number": 6, "chapter": "第六章", "stem": "飞机上的一点，若在该点将飞机支撑或悬挂起来，那么飞机会处于平衡状态，即无任何方向的倾斜和转动，则该点称为：", "options": [{"letter": "A", "text": "驻点"}, {"letter": "B", "text": "焦点(空气动力中心)"}, {"letter": "C", "text": "重心"}, {"letter": "D", "text": "压力中心"}], "answer": "C", "explanation": "", "answers": []}, {"id": 394, "type": "choice", "label": "单选题", "number": 7, "chapter": "第六章", "stem": "飞机重心过于靠前时，则会导致：", "options": [{"letter": "A", "text": "飞行阻力减小"}, {"letter": "B", "text": "失速速度增大"}, {"letter": "C", "text": "稳定性变差"}, {"letter": "D", "text": "远程巡航速度减小"}], "answer": "B", "explanation": "重心向前移动时，阻力增加(课本上有解释)，使得平飞所需推力曲线向上(阻力增加)、向右移动(平飞所需速度增加)，因此切线速度(喷气飞机的远航速度)也会增加。 重心向前移动，与焦点的距离变长(焦点必然在重心之后)，因此稳定力臂增大，稳定力矩也增大，因此稳定性变强。", "answers": []}, {"id": 395, "type": "choice", "label": "单选题", "number": 8, "chapter": "第六章", "stem": "重心太靠前，会使相同条件下保持定常平飞的飞机的总阻力：", "options": [{"letter": "A", "text": "保持不变"}, {"letter": "B", "text": "根据飞机的重量确定"}, {"letter": "C", "text": "减小"}, {"letter": "D", "text": "增加"}], "answer": "D", "explanation": "", "answers": []}, {"id": 396, "type": "choice", "label": "单选题", "number": 9, "chapter": "第六章", "stem": "一般受飞机重心的前后位置变化影响最小的是：", "options": [{"letter": "A", "text": "空中最小操纵速度"}, {"letter": "B", "text": "滚转操纵"}, {"letter": "C", "text": "方向操纵"}, {"letter": "D", "text": "俯仰操纵"}], "answer": "B", "explanation": "", "answers": []}, {"id": 397, "type": "choice", "label": "单选题", "number": 10, "chapter": "第六章", "stem": "飞机起飞时，在其他条件相同的情况下，若重心靠后，则起飞离地时的拉杆力：", "options": [{"letter": "A", "text": "保持正常的杆力不变"}, {"letter": "B", "text": "变重"}, {"letter": "C", "text": "变轻"}, {"letter": "D", "text": "不一定"}], "answer": "C", "explanation": "", "answers": []}, {"id": 398, "type": "choice", "label": "单选题", "number": 1, "chapter": "第六章", "stem": "直线飞行中,驾驶杆前后的每一个位置对应一个( )。", "options": [{"letter": "A", "text": "迎角"}, {"letter": "B", "text": "侧滑角"}, {"letter": "C", "text": "滚转角速度"}], "answer": "A", "explanation": "", "answers": []}, {"id": 399, "type": "choice", "label": "单选题", "number": 2, "chapter": "第六章", "stem": "对于小型螺旋桨飞机，有关升降舵偏角(驾驶杆的前后位置)与速度之间的关系，以下说法正确的是:", "options": [{"letter": "A", "text": "大速度平飞时，升降舵需要保持下偏，即持续推杆"}, {"letter": "B", "text": "小速度平飞时，升降舵需要保持下偏，即持续拉杆"}, {"letter": "C", "text": "进行平飞加速时，升降舵需要逐渐增加上偏角，即增加拉杆量"}, {"letter": "D", "text": "无论以什么速度平飞，都不需要偏转升降舵，只需要配平即可"}], "answer": "A", "explanation": "", "answers": []}, {"id": 400, "type": "choice", "label": "单选题", "number": 3, "chapter": "第六章", "stem": "配平片的主要作用是( )。", "options": [{"letter": "A", "text": "减小或消除杆力"}, {"letter": "B", "text": "进行俯仰操纵"}, {"letter": "C", "text": "增加升力"}], "answer": "A", "explanation": "", "answers": []}, {"id": 401, "type": "choice", "label": "单选题", "number": 4, "chapter": "第六章", "stem": "当飞行员觉得拉杆较为吃力时,应( )。", "options": [{"letter": "A", "text": "向前拨动配平手轮"}, {"letter": "B", "text": "向后拨动配平手轮"}, {"letter": "C", "text": "加强体育锻炼"}], "answer": "B", "explanation": "", "answers": []}, {"id": 402, "type": "choice", "label": "单选题", "number": 5, "chapter": "第六章", "stem": "配平片的偏转方向与升降舵偏转方向( )。", "options": [{"letter": "A", "text": "相同"}, {"letter": "B", "text": "相反"}, {"letter": "C", "text": "不能确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 403, "type": "choice", "label": "单选题", "number": 6, "chapter": "第六章", "stem": "对飞机进行配平操纵时,操纵配平动作的方向( )。", "options": [{"letter": "A", "text": "与相应的主操纵方向一致"}, {"letter": "B", "text": "与相应的主操纵方向相反"}, {"letter": "C", "text": "每个机型不一样"}], "answer": "A", "explanation": "飞机进行配平操纵时,操纵配平动作的方向与相应的主操纵方向一致。", "answers": []}, {"id": 404, "type": "choice", "label": "单选题", "number": 7, "chapter": "第六章", "stem": "配平片的偏转方向与驾驶舱内配平拨轮的操纵方向( )。", "options": [{"letter": "A", "text": "相同"}, {"letter": "B", "text": "相反"}, {"letter": "C", "text": "不能确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 405, "type": "choice", "label": "单选题", "number": 8, "chapter": "第六章", "stem": "水平安定面固定的飞机常用升降舵配平片来控制杆力，飞行中，如果把杆力配平在较大速度，在小速度飞行时，如果不动配平片,则:", "options": [{"letter": "A", "text": "需施加一个较大的拉杆力才能使飞机保持俯仰平衡"}, {"letter": "B", "text": "需施加一个较大的推杆力才能使飞机保持俯仰平衡"}, {"letter": "C", "text": "可能施加拉杆力,也可能施加推杆力"}], "answer": "A", "explanation": "飞行中配平片可以减小和消除杆力。 飞行中,如果把杆力配平在较大位置,小速度飞行时,如果不动配平片,则需施加较大的拉杆力才能保持飞机的俯仰平衡;如果把杆力配平在较小速度,在大速度飞行时,如果不动配平片,则需施加一个较大的推杆力才能时飞机保持俯仰平衡。", "answers": []}, {"id": 406, "type": "choice", "label": "单选题", "number": 9, "chapter": "第六章", "stem": "起飞前如果升降舵配平片配平过于靠前，这时抬前轮会出现:", "options": [{"letter": "A", "text": "杆力过轻易导致擦机尾"}, {"letter": "B", "text": "抬前轮时杆力过重"}, {"letter": "C", "text": "杆力随抬前轮速度不同可能为拉杆力也可能为推杆力，杆力不会太大"}, {"letter": "D", "text": "杆力无变化"}], "answer": "B", "explanation": "", "answers": []}, {"id": 407, "type": "choice", "label": "单选题", "number": 10, "chapter": "第六章", "stem": "起飞前如果配平位置过于靠后,在起飞抬前轮时,则：", "options": [{"letter": "A", "text": "拉杆力过轻容易出现操纵过量"}, {"letter": "B", "text": "拉杆力过重容易出现操纵不足"}, {"letter": "C", "text": "拉杆力过轻容易出现操纵不足"}], "answer": "A", "explanation": "起飞前配平调整片必须置于规定位置,以防止杆力异常。起飞前如果升降舵调整片配平过于靠前,在起飞抬前轮时会出现杆力过重;反之,起飞前如果升降舵调整片配平过于靠后,在起飞抬前轮时杆力过轻,易出现过量操纵。", "answers": []}, {"id": 408, "type": "choice", "label": "单选题", "number": 11, "chapter": "第六章", "stem": "关于大型运输机在起飞前的可配平水平安定面（THS）设置，下列说法正确的是：", "options": [{"letter": "A", "text": "飞机机头较重时的安定面前缘位置比机尾较重时的低"}, {"letter": "B", "text": "当飞机重心在后极限时，THS需要设置为最大下偏刻度，以发挥升降舵在抬轮过程中的最大效能"}, {"letter": "C", "text": "如果THS前缘位置过低，会导致拉杆抬轮时的杆力过大"}, {"letter": "D", "text": "THS的设置与襟翼位置无关"}], "answer": "A", "explanation": "", "answers": []}, {"id": 409, "type": "choice", "label": "单选题", "number": 12, "chapter": "第六章", "stem": "当大型运输机得到正确的配平时，升降舵相对于可配平水平安定面（THS）的偏转方向为：", "options": [{"letter": "A", "text": "如果重心比较靠前，则上偏"}, {"letter": "B", "text": "如果重心比较靠前，则下偏"}, {"letter": "C", "text": "如果重心比较靠后，则下偏"}, {"letter": "D", "text": "中立"}], "answer": "D", "explanation": "", "answers": []}, {"id": 410, "type": "choice", "label": "单选题", "number": 1, "chapter": "第六章", "stem": "飞机机翼的参考面积除以翼展等于：", "options": [{"letter": "A", "text": "几何平均弦SMC"}, {"letter": "B", "text": "平均空气动力弦MAC"}, {"letter": "C", "text": "展弦比"}, {"letter": "D", "text": "中弧曲度"}], "answer": "A", "explanation": "", "answers": []}, {"id": 411, "type": "fill", "label": "填空题", "number": 2, "chapter": "第六章", "stem": "某小型飞机需要通过称重得出其基本空机质量和重心位置。已知该飞机基准面、机轮距离等数据如下图所示：", "options": [], "answer": "509.7、24.0", "explanation": "重量 力臂 力矩 前轮 600 -20 -12,000 左侧主轮 2200 +30 +66,000 右侧主轮 2200 +30 +66,000 总重量：5000 N 总力矩：120,000 N*in 因此，飞机质量为5000 / 9.81 = 509.7 kg 重心力臂为120,000 / 5000 = 24.0 inches", "answers": ["509.7", "24.0"]}, {"id": 412, "type": "fill", "label": "填空题", "number": 4, "chapter": "第六章", "stem": "已知重心(CG)的平衡力臂为=648.5in，飞机的平均气动弦长=134.5in，平均空气动力弦前缘的平衡力臂为=625.6in，计算用平均空气动力弦(MAC)的百分数表示的重心位置= %MAC (四舍五入，保留两位小数)。", "options": [], "answer": "17.02-17.04", "explanation": "(648.5-625.6)÷134.5×100%=17.03%", "answers": ["17.02-17.04"]}, {"id": 413, "type": "fill", "label": "填空题", "number": 5, "chapter": "第六章", "stem": "如果一架飞机的重量为3650lbs，重心在94.0站位，现要将重心移至92.0站位，需将 lbs (四舍五入，保留两位小数) 的行李由站位180的后行李舱移到站位40的前行李舱。", "options": [], "answer": "52.13-52.15", "explanation": "注意，改变量=改变后的量 - 改变前的量。 根据条件，设移动的行李重量为x，代入公式得： 计算得x=52.14lb", "answers": ["52.13-52.15"]}, {"id": 414, "type": "fill", "label": "填空题", "number": 6, "chapter": "第六章", "stem": "飞机原总重6680lb，原重心位置80in，准备在力臂为150in的行李舱中增加行李140lb。确定新的重心位置为 in (四舍五入，保留两位小数)。", "options": [], "answer": "81.43-81.45", "explanation": "其中改变量 = 改变后的量 - 改变前的量。 根据条件，设重心改变量为△CG，代入公式： 计算后得到△CG=1.44in 则新的重心位置=原重心位置+△CG=80+1.44=81.44in", "answers": ["81.43-81.45"]}, {"id": 415, "type": "choice", "label": "单选题", "number": 1, "chapter": "第六章", "stem": "下面的载荷中不属于DOW的是：", "options": [{"letter": "A", "text": "飞行机组"}, {"letter": "B", "text": "发动机滑油"}, {"letter": "C", "text": "油箱底油"}, {"letter": "D", "text": "备份燃油"}], "answer": "D", "explanation": "注意：油箱底油，又称为“死油”，它是包含在干使用重量中的。", "answers": []}, {"id": 416, "type": "choice", "label": "单选题", "number": 2, "chapter": "第六章", "stem": "飞机在起飞机场的停机坪重量 = ( )。", "options": [{"letter": "A", "text": "干使用重量+商载重量"}, {"letter": "B", "text": "零燃油重量+燃油重量"}, {"letter": "C", "text": "航程燃油+着陆重量"}, {" ", "number": 9, "chapter": "第六章", "stem": "已知： 结构限制的最大起飞重量为62000kg； 结构限制的最大着陆重量为53700kg； 最大零燃油重量为48000kg； 性能限制的最大起飞重量为75000kg； 性能限制的最大着陆重量为51400kg； 起飞燃油重量为13800kg； 航程燃油重量为5950kg。 则放行最大起飞重量等于 kg。", "options": [], "answer": "57350", "explanation": "放行最大起飞重量为62000kg、57350kg、61800kg中的最小值", "answers": ["57350"]}, {"id": 424, "type": "choice", "label": "单选题", "number": 1, "chapter": "第六章", "stem": "在飞机的航程与起飞重量、载油量、商载的关系中所谓的第一距离范围（最大商载范围）是指飞行距离小于或等于该航程的范围时，要增加航程则：", "options": [{"letter": "A", "text": "需要增加燃油，并且要减小商载"}, {"letter": "B", "text": "需要减少燃油，并且保持最大商载"}, {"letter": "C", "text": "需要增加燃油，并且保持最大商载"}, {"letter": "D", "text": "需要减少燃油，并且增加商载"}], "answer": "C", "explanation": "业载航程图：", "answers": []}, {"id": 425, "type": "fill", "label": "填空题", "number": 2, "chapter": "第六章", "stem": "已知： 结构限制的最大起飞重量为62000kg； 结构限制的最大着陆重量为53700kg； 最大零燃油重量为48000kg； 干使用重量为25200kg； 性能限制的最大起飞重量为75000kg； 性能限制的最大着陆重量为51400kg； 起飞燃油重量为13800kg； 航程燃油重量为5950kg。 则最大业载等于 kg。", "options": [], "answer": "18350", "explanation": "放行最大起飞重量为62000kg、57350kg、61800kg中的最小值，即57350kg 最大业载 = 57350kg - 25200kg - 13800kg = 18350kg", "answers": ["18350"]}, {"id": 426, "type": "choice", "label": "单选题", "number": 1, "chapter": "第六章", "stem": "纵向载荷是指", "options": [{"letter": "A", "text": "沿飞机纵轴的压力分布"}, {"letter": "B", "text": "沿机身纵向单位长度地板能够承载的最大重量"}, {"letter": "C", "text": "沿机身纵向加装的货物重量"}], "answer": "B", "explanation": "B 题目详解:纵向载荷(running load)是指沿机身纵向单位长度地板能够承载的最大重量,单位磅/英尺。 本题考点:商照-重量限制", "answers": []}, {"id": 427, "type": "choice", "label": "单选题", "number": 2, "chapter": "第六章", "stem": "单位面积地板能够承受的最大重量是", "options": [{"letter": "A", "text": "面积载荷"}, {"letter": "B", "text": "地板载荷"}, {"letter": "C", "text": "机舱载重"}], "answer": "A", "explanation": "A 题目详解:面积载荷(floor load)是指单位面积地板能够承受的最大重量,单位磅/平方英尺。 本题考点:商照-重量限制", "answers": []}, {"id": 428, "type": "choice", "label": "单选题", "number": 3, "chapter": "第六章", "stem": "一个长115英寸,宽73英寸的托盘上,放置了一个12千克的货物,一个10千克的行李箱,一个8千克的沙袋,托盘的长度方向与地板纵向一致,求地板所承受的纵向载荷?", "options": [{"letter": "A", "text": "7磅/英尺"}, {"letter": "B", "text": "15磅/英尺"}, {"letter": "C", "text": "15千克/英尺"}], "answer": "A", "explanation": "A 题目详解:纵向载荷(running load)是指沿机身纵向单位长度地板能够承载的最大重量,单位磅/英尺。根据题意:总重量=12+10+8=30KG=66磅,地板受力的纵向长度就是托盘的长度:115英寸≈9.6英尺。纵向载荷=66/9.6≈7磅/英尺。 本题考点:商照-重量限制", "answers": []}, {"id": 429, "type": "choice", "label": "单选题", "number": 4, "chapter": "第六章", "stem": "一个长115英寸,宽73英寸的地板上,放置了一个12千克的货物,一个10千克的行李箱,一个8千克的沙袋,求地板所承受的面积载荷?", "options": [{"letter": "A", "text": "1.14磅/平方英尺"}, {"letter": "B", "text": "0.52磅/平方英尺"}, {"letter": "C", "text": "114磅/平方英寸"}], "answer": "A", "explanation": "A 题目详解:面积载荷(floor load)是指单位面积地板能够承受的最大重量,单位磅/平方英尺。根据题意:总重量=12+10+8=30KG=66磅,地板面积:73*115=8395平方英寸=58平方英尺。面积载荷=66/58=1.14磅/平方英尺。 本题考点:商照-重量限制", "answers": []}, {"id": 430, "type": "choice", "label": "单选题", "number": 5, "chapter": "第六章", "stem": "某地板承载限制是169磅/平方英尺,货盘重量47磅,系留装置33磅,则一个36英寸X48英寸的地板最大承载的重量是?", "options": [{"letter": "A", "text": "1948磅"}, {"letter": "B", "text": "2028磅"}, {"letter": "C", "text": "1876磅"}], "answer": "A", "explanation": "A 题目详解:地板面积=36*48=1728平方英寸=12平方英尺,可承受的最大重量=12*169=2028磅,最大载重=2028-33-47=1948磅 本题考点:商照-重量限制", "answers": []}, {"id": 431, "type": "fill", "label": "填空题", "number": 1, "chapter": "第六章", "stem": "已知：某飞机空机重为1750磅，空机重力矩为79000磅英寸（或79千磅英寸）。执行飞行任务时的力矩与载重关系图为[S-6-1]，装载情况是： 前排座位重量350磅， 第二排座位重量250磅， 燃油500磅， 行李舱A装货物100磅， 行李舱B装货物50磅。 试计算装载后的重心的位置(平衡力臂)= 英寸。", "options": [], "answer": "50", "explanation": "则重心位置=总力矩/总重量=150/3000=0.05 (1000in)=50 (in)。", "answers": ["50"]}, {"id": 432, "type": "fill", "label": "填空题", "number": 2, "chapter": "第六章", "stem": "根据图[S-6-2]，已知某空客A320飞机装载情况如下： 干使用重量 95,000 lb 干使用重心 26 %MAC 误差校正 400 lb in zone F 货物总重 10500 lb 货舱1 5000 lb 货舱3 2000 lb 货舱4 1000 lb 货舱5 2500 lb 乘客共计 156 人 (165 lb / PAX) 客舱OA 40 客舱OB 66 客舱OC 50 起飞燃油共计20 000 lb 问：若航程油量为13 000 lb，则着陆重量的重心位置为 %MAC。", "options": [], "answer": "32.0-33.0", "explanation": "根据条件画图，需要注意的是航程油耗13,000lb，则油箱里剩余油量为20,000-13,000=7,000lb。 红色线为求解零燃油重量ZFW对应的重心，蓝色线为求解着陆重量LDW对应的重心。 重心包线 ": "C", "text": "机翼迎角超过了临界迎角"}, {"letter": "D", "text": "翼尖处先发生了失速"}], "answer": "B", "explanation": "", "answers": []}, {"id": 438, "type": "choice", "label": "单选题", "number": 6, "chapter": "第四章改", "stem": "当飞机飞行马赫数超过临界马赫数以后，如果飞行马赫数继续增加，以下关于激波失速、激波分离、高速抖振的前后逻辑顺序，正确的是:", "options": [{"letter": "A", "text": "激波失速→高速抖振→激波分离"}, {"letter": "B", "text": "激波分离→高速抖振→激波失速"}, {"letter": "C", "text": "高速抖振→激波分离→激波失速"}, {"letter": "D", "text": "高速抖振→激波失速→激波分离"}], "answer": "B", "explanation": "", "answers": []}, {"id": 439, "type": "choice", "label": "单选题", "number": 7, "chapter": "第四章改", "stem": "关于飞机在高速飞行时的阻力特性，当飞行马赫数( )时，阻力系数将会开始急剧增加。", "options": [{"letter": "A", "text": "超过0.3"}, {"letter": "B", "text": "超过临界马赫数"}, {"letter": "C", "text": "超过阻力发散马赫数"}, {"letter": "D", "text": "超过1.0"}], "answer": "C", "explanation": "", "answers": []}, {"id": 440, "type": "choice", "label": "单选题", "number": 8, "chapter": "第四章改", "stem": "高亚音速飞机的飞行马赫数在( )以上时，由于( )，阻力将会急剧增加。", "options": [{"letter": "A", "text": "0.3 Mach，额外增加的摩擦阻力"}, {"letter": "B", "text": "临界马赫数，额外增加的压差阻力"}, {"letter": "C", "text": "临界马赫数，机翼上表面出现局部激波"}, {"letter": "D", "text": "阻力发散马赫数，机翼上表面局部激波增强"}], "answer": "D", "explanation": "", "answers": []}, {"id": 441, "type": "choice", "label": "单选题", "number": 9, "chapter": "第四章改", "stem": "一般情况下，机翼的阻力发散马赫数( )临界马赫数。", "options": [{"letter": "A", "text": "等于"}, {"letter": "B", "text": "小于"}, {"letter": "C", "text": "大于"}], "answer": "C", "explanation": "一般情况下, 临界马赫数小于阻力发散马赫数。", "answers": []}, {"id": 442, "type": "choice", "label": "单选题", "number": 10, "chapter": "第四章改", "stem": "超临界翼型的设计目的(最大优点)是为了:", "options": [{"letter": "A", "text": "提高临界马赫数"}, {"letter": "B", "text": "提高阻力发散马赫数"}, {"letter": "C", "text": "提高升力的产生效率"}, {"letter": "D", "text": "减小临界迎角，减小失速速度"}], "answer": "B", "explanation": "", "answers": []}, {"id": 443, "type": "choice", "label": "单选题", "number": 11, "chapter": "第四章改", "stem": "高亚音速飞机通常采用后掠翼的设计，其目的主要是:", "options": [{"letter": "A", "text": "增大临界迎角"}, {"letter": "B", "text": "减小失速速度"}, {"letter": "C", "text": "提高临界马赫数"}, {"letter": "D", "text": "增大着陆速度以防止飞机失速"}], "answer": "C", "explanation": "", "answers": []}, {"id": 444, "type": "choice", "label": "单选题", "number": 1, "chapter": "第四章改", "stem": "飞机由于商载引起的重量增加，则会使航程：", "options": [{"letter": "A", "text": "增加"}, {"letter": "B", "text": "减小"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不能确定"}], "answer": "B", "explanation": "飞机的商载，即商业载荷，就是乘客（包含随身行李）和货物的重量，也是运营航空公司获取经济利益的载荷。英文名称为Pay Load或Traffic Load。商载越大，飞机越重，而所加油量不变，则航程减小。 如果是加油引起的重量增加(例如多加油)，虽然飞机重量也增加了，但航程是增加的。", "answers": []}, {"id": 445, "type": "choice", "label": "单选题", "number": 2, "chapter": "第四章改", "stem": "飞机由于携带大量燃油引起的重量增加，则会使航程：", "options": [{"letter": "A", "text": "增大"}, {"letter": "B", "text": "减小"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "由于携带大量燃油引起的重量增加，航程会增加（燃油带的多，虽然重量增加了，但巡航能力依然是增加的，即航程增大）", "answers": []}, {"id": 446, "type": "choice", "label": "单选题", "number": 3, "chapter": "第四章改", "stem": "飞行马赫数与升阻比的乘积MK称为巡航因子或气动效率，其值越大，则航程：", "options": [{"letter": "A", "text": "越大"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "与MK无关"}, {"letter": "D", "text": "无法确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 447, "type": "choice", "label": "单选题", "number": 4, "chapter": "第四章改", "stem": "活塞式螺旋桨飞机的最大航程速度或远航速度VMRC是：", "options": [{"letter": "A", "text": "经济速度"}, {"letter": "B", "text": "最小功率速度"}, {"letter": "C", "text": "有利速度"}, {"letter": "D", "text": "平飞最小速度"}], "answer": "C", "explanation": "螺旋桨飞机的燃油里程SR=TAS/(SFC*N)=1/(SFC*P)，即，当平飞所需拉力最小时，活塞式螺旋桨飞机的燃油里程最大，因此航程最大。平飞所需拉力最小所对应的速度，就是有利速度。", "answers": []}, {"id": 448, "type": "choice", "label": "单选题", "number": 5, "chapter": "第四章改", "stem": "现代大型民航飞机的最大航程速度或远航速度VMRC是：", "options": [{"letter": "A", "text": "TRE/V最大时的速度"}, {"letter": "B", "text": "最大升阻比速度"}, {"letter": "C", "text": "MK最大的速度"}, {"letter": "D", "text": "最小平飞速度"}], "answer": "C", "explanation": "", "answers": []}, {"id": 449, "type": "choice", "label": "单选题", "number": 1, "chapter": "第四章改", "stem": "飞行马赫数与升阻比的乘积MK称为巡航因子或气动效率，其值越大，则航程：", "options": [{"letter": "A", "text": "越大"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "与MK无关"}, {"letter": "D", "text": "无法确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 450, "type": "choice", "label": "单选题", "number": 2, "chapter": "第四章改", "stem": "现代大型民航飞机的最大航程速度或远航速度VMRC是：", "options": [{"letter": "A", "text": "TRE/V最大时的速度"}, {"letter": "B", "text": "最大升阻比速度"}, {"letter": "C", "text": "MK最大的速度"}, {"letter": "D", "text": "最小平飞速度"}], "answer": "C", "explanation": "", "answers": []}, {"id": 451, "type": "choice", "label": "单选题", "number": 3, "chapter": "第四章改", "stem": "关于MRC巡航，下列说法不正确的是：", "options": [{"letter": "A", "text": "其航程最远"}, {"letter": "B", "text": "其MK最大"}, {"letter": "C", "text": "其航时最长"}, {"letter": "D", "text": "其燃油成本最低"}], "answer": "C", "explanation": "", "answers": []}, {"id": 452, "type": "choice", "label": "单选题", "number": 4, "chapter": "第四章改", "stem": "采用LRC巡航方式的燃油里程比采用MRC巡航方式的低（ ）。", "options": [{"letter": "A", "text": "1%"}, {"letter": "B", "text": "2%"}, {"letter": "C", "text": "5%"}, {"letter": "D", "text": "10%"}], "answer": "A", "explanation": "", "answers": []}, {"id": 453, "type": "choice", "label": "单选题", "number": 5, "chapter": "第四章改", "stem": "等高度的MRC和LRC巡航：为了保持最优的巡航性能，随着飞行重量的 ，应该调整飞行M数 。", "options": [{"letter": "A", "text": "降低 增加"}, {"letter": "B", "text": "降低 保持不变"}, {"letter": "C", "text": "增大 保持不变"}, {"letter": "D", "text": "降低 降低"}], "answer": "D", "explanation": "", "answers": []}, {"id": 454, "type": "choice", "label": "单选题", "number": 6, "chapter": "第四章改", "stem": "飞机重量越重，则最大航程速度VMRC（ ），远程速度VLRC（ ）。", "options": [{"letter": "A", "text": "越大，越小"}, {"letter": "B", "text": "越小，越小"}, {"letter": "C", "text": "越大，越大"}, {"letter": "D", "text": "越小，越大"}], "answer": "C", "explanation": "", "answers": []}, {"id": 455, "type": "choice", "label": "单选题", "number": 7, "chapter": xt": "真空速"}, {"letter": "C", "text": "巡航高度"}, {"letter": "D", "text": "地速"}], "answer": "C", "explanation": "", "answers": []}, {"id": 466, "type": "choice", "label": "单选题", "number": 5, "chapter": "第四章改", "stem": "巡航中，大型民航飞机的远航高度将会随着重量的减轻而（ ）。", "options": [{"letter": "A", "text": "增高"}, {"letter": "B", "text": "降低"}, {"letter": "C", "text": "保持不变"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 467, "type": "choice", "label": "单选题", "number": 6, "chapter": "第四章改", "stem": "短航程飞行时，合理的巡航高度通常（ ）飞机的远航高度。", "options": [{"letter": "A", "text": "高于"}, {"letter": "B", "text": "低于"}, {"letter": "C", "text": "等于"}, {"letter": "D", "text": "不确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 468, "type": "choice", "label": "单选题", "number": 1, "chapter": "第四章改", "stem": "大型民航客机重量减轻时，其可选择的最大巡航高度将（ ）。", "options": [{"letter": "A", "text": "升高"}, {"letter": "B", "text": "不变"}, {"letter": "C", "text": "降低"}, {"letter": "D", "text": "无法确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 469, "type": "choice", "label": "单选题", "number": 2, "chapter": "第四章改", "stem": "当外界温度升高时，大型民航客机的最大巡航高度（ ）。", "options": [{"letter": "A", "text": "升高"}, {"letter": "B", "text": "不变"}, {"letter": "C", "text": "降低"}, {"letter": "D", "text": "无法确定"}], "answer": "D", "explanation": "当外界温度增加时（注意：必须高于平台温度），由于发动机最大推力受涡轮燃气温度限制而减小，因此在高温时由于推力的减小会限制飞机的最大飞行高度，并且最大飞行速度也会降低。 如果外界温度低于平台温度的范围内变化，则发动机最大推力并没有发生变化，因此最大巡航高度也不会发生变化。 而题目中并未明确温度的范围，因此，正确答案是：无法确定。", "answers": []}, {"id": 470, "type": "choice", "label": "单选题", "number": 3, "chapter": "第四章改", "stem": "某A320飞机计划的开始巡航重量为75 t，选择LRC巡航方式，并且已知： 最大审定高度为 39800 ft， 上升升限为 36500 ft 1.3g抖振限制高度为 37000 ft， 最大巡航推力限制的最大巡航高度为 36900 ft， 最佳巡航高度为 35400 ft。 则该飞机巡航时所能选择的最大巡航高度为（ ）。", "options": [{"letter": "A", "text": "39800 ft"}, {"letter": "B", "text": "37000 ft"}, {"letter": "C", "text": "36900 ft"}, {"letter": "D", "text": "36500 ft"}, {"letter": "E", "text": "35400 ft"}], "answer": "D", "explanation": "大型民用运输机的最大运行高度，即，实际运行中可选择的最大巡航高度，是最大审定高度、上升升限、抖振限制高度、最大巡航推力限制的最大巡航高度等四个限制高度的最小值。 注意： 1 课本、学习资料中的最大巡航高度，其实并非实际运行中真正的最大巡航高度，而是最大巡航推力限制的最大高度。实际中的最大巡航高度，其实是最大运行高度，即可选择的最大巡航高度，也就是上面四个限制高度的最小值。 2 最佳巡航高度只是燃油里程最大时的巡航高度，并非限制高度。", "answers": []}, {"id": 471, "type": "choice", "label": "单选题", "number": 1, "chapter": "第四章改", "stem": "下列哪一个因素会导致巡航航程增长？", "options": [{"letter": "A", "text": "选择逆风大顺风小的高度飞行"}, {"letter": "B", "text": "偏离最佳远航高度"}, {"letter": "C", "text": "放起落架飞行"}, {"letter": "D", "text": "选择逆风小顺风大的高度飞行"}], "answer": "D", "explanation": "", "answers": []}, {"id": 472, "type": "choice", "label": "单选题", "number": 2, "chapter": "第四章改", "stem": "当大型民航客机在高空巡航过程中遇到逆风时，飞行员为使巡航油耗最小，应该：", "options": [{"letter": "A", "text": "提高飞行马赫数"}, {"letter": "B", "text": "降低飞行马赫数"}, {"letter": "C", "text": "维持飞行马赫数"}, {"letter": "D", "text": "维持空速表读数"}], "answer": "A", "explanation": "对喷气式运输机： 在顺风中巡航时的MRC速度比无风时的MRC速度要小，燃油里程增大，省油； 在逆风中巡航时的MRC速度比无风时的MRC速度要大，燃油里程减小，耗油。 具体原因，请详见PPT中“风对远航速度的影响”相关内容。", "answers": []}, {"id": 473, "type": "choice", "label": "单选题", "number": 3, "chapter": "第四章改", "stem": "已知A机场至B机场航线距离1512海里，飞机巡航飞行的真空速是400节，航路上遇到大逆风-40节和顺风20节两种情况下，飞行时间相差：", "options": [{"letter": "A", "text": "25分钟"}, {"letter": "B", "text": "18分钟"}, {"letter": "C", "text": "32分钟"}, {"letter": "D", "text": "36分钟"}], "answer": "D", "explanation": "逆风40kt，则地速=400-40=360kt，飞行时间=1512/360=4.2h 顺风20kt，则地速=400+20=420kt，飞行时间=1512/420=3.6h 两者飞行时间相差：4.2-3.6=0.6h=36min", "answers": []}, {"id": 474, "type": "choice", "label": "单选题", "number": 4, "chapter": "第四章改", "stem": "大型民用运输机，其他条件相同，在顺风中巡航时与逆风中巡航时相比，空中燃油里程SAR（ ），地面燃油里程SGR（ ）。", "options": [{"letter": "A", "text": "顺风大，顺风大"}, {"letter": "B", "text": "顺风大，顺风小"}, {"letter": "C", "text": "两者相等，顺风大"}, {"letter": "D", "text": "两者相等，顺风小"}], "answer": "C", "explanation": "", "answers": []}, {"id": 475, "type": "choice", "label": "单选题", "number": 5, "chapter": "第四章改", "stem": "大型民用运输机，其他条件相同，在顺风中巡航时与逆风中巡航时相比，空中航程（ ），地面航程（ ）。", "options": [{"letter": "A", "text": "顺风大，顺风小"}, {"letter": "B", "text": "顺风大，顺风大"}, {"letter": "C", "text": "两者相等，顺风大"}, {"letter": "D", "text": "两者相等，顺风小"}], "answer": "C", "explanation": "", "answers": []}, {"id": 476, "type": "choice", "label": "单选题", "number": 6, "chapter": "第四章改", "stem": "大型民用运输机，在逆风中巡航，为了节省燃油，应适当（ ）飞行速度； 在适当调整飞行速度，且到达目标机场后，飞机的总油耗（ ）无风时的总油耗。", "options": [{"letter": "A", "text": "增加，大于"}, {"letter": "B", "text": "增加，等于"}, {"letter": "C", "text": "减小，等于"}, {"letter": "D", "text": "减小，大于"}], "answer": "A", "explanation": "", "answers": []}, {"id": 477, "type": "choice", "label": "单选题", "number": 7, "chapter": "第四章改", "stem": "大型民用运输机，其他条件相同，在顺风中巡航时与逆风中巡航时相比，升力（ ），阻力（ ），发动机推力（ ）。", "options": [{"letter": "A", "text": "顺风小，顺风小，顺风小"}, {"letter": "B", "text": "顺风大，顺风大，顺风大"}, {"letter": "C", "text": "两者相等，两者相等，顺风小"}, {"letter": "D", "text": "两者相等，两者相等，两者相等"}], "answer": "D", "explanation": "", "answers": []}, {"id": 478, "type": "choice", "label": "单选题", "number": 8, "chapter": "第四章改", "stem": "大型民用运输机，在侧风中巡航时与无风时巡航相比：", "options": [{"letter": "A", "text": "存在侧滑，但不存在偏流，即飞机航向不等于航迹方向"}, {"letter": "B", "text": "不存在侧滑，但存在偏流，即飞机航向不等于航迹方向"}, {"letter": "C", "text": "存在侧滑，同时也存在偏流，即飞机航向不等于航迹方向"}, {"letter": "D", "text": "不存在侧滑，也不存在偏流，即飞机航向等于航迹方向"}], "answer": "B", "explanation": "大部分初学者，对侧风中的飞行往往存在误区：认为侧风中飞行时有侧滑，即飞机所感受到的气流方向是侧面吹来的。 我们常说的高空中的风，指的是稳定风场，即，风速和风向都不变的风。 飞机是相对于空气飞行的，并非相对于地面。例如，一架非常轻的小型飞机，停在地面上时，一阵强风就能把它吹起来，就说明了，它的地速为0，但只要有真空速，就会产生气动力。 飞机在有风时的飞行，与无风时的飞行，只从气动力、飞行力学角度来看，没有区别，即：真空速、升力、阻力、发动机推力、相对于空气的运动距离全都没有区别。 但是，把参照物放在地面上，则飞机相对于地面的运动自然就会有所不同，也就是我们常说的顺风远、逆风近。 侧风时，也一样，飞机是相对于空气运动的，而空气相对于地面是侧向运动的，仅此而已。飞机所感受到的相对气流速度依然是正前面吹来的，即没有侧滑，但从地面上看飞机，飞机的运动轨迹则是向侧风方向一侧偏移的。可以想象一下，我们在搭乘自动扶梯时（大型商场里的长长的斜电梯），如果我们在扶梯横着移动时，我们人本身相对扶梯只有一个横向速度，但是相对地面则是存在侧向的向前速度。 对飞机来说，虽然没有侧滑，但这样是不行的，因为存在偏流（飞机对称面与运动轨迹不一致），就会导致偏航，即飞机的实际轨迹偏离预定航线。所以需要进行侧风修正，在巡航阶段，往往使用“改变航向法”进行修正，即飞机机头方向（即航向）朝侧风方向偏转一个角度，使得飞行轨迹与航线一致。但是，这么做，依然存在偏流，即飞机对称面方向（即航向）与飞行轨迹方向不一致。", "answers": []}, {"id": 479, "type": "choice", "label": "单选题", "number": 9, "chapter": "第四章改", "stem": "大型民用运输机，使用“改变航向法”在稳定的侧风中巡航时：", "options": [{"letter": "A", "text": "升阻比不变，同时方向舵需要向侧风方向保持偏转一个角度"}, {"letter": "B", "text": "升阻比不变，同时方向舵需要向侧风方向的反方向保持偏转一个角度"}, {"letter": "C", "text": "升阻比不变，同时方向舵不发生偏转"}, {"letter": "D", "text": "升阻比不变，同时需要飞行员操作方向舵调整片或配平片以保持飞机航向"}], "answer": "C", "explanation": "在飞行原理中，我们都学过：使用改变航向法修正侧风时，升阻比不变；相对应的，使用侧滑法修正侧风时，升阻比减小。 可是，改变航向法修正侧风影响，为什么升阻比不变呢？ 原因正是它的名字：改变航向，即，飞行员只需要改变并保持新的航向即可。从操纵上来讲，就是飞行员向侧风方向踩舵，当飞机航向改变量正好等于偏流角时，飞行员就可以松舵了，方向舵回到中立位置，此时飞机就保持在新的航向，自此以后，飞机的操纵面都是中立位置，也不存在侧滑，气动阻力没有发生变化，因此升阻比不变。（升力一直等于重力，不变） 而侧滑法，则是需要飞行员向侧风方法保持压盘，同时保持蹬反舵，飞机的操纵面都是偏转的，并且存在上风方向的侧滑，因此气动阻力大幅增加的，升阻比减小。", "answers": []}, {"id": 480, "type": "choice", "label": "单选题", "number": 10, "chapter": "第四章改", "stem": "以下选项中，对风因子的理解正确的是：", "options": [{"letter": "A", "text": "风因子是指定重量和巡航高度时的最大顺风风速值，实际风速高于此值，则巡航性能就会下降"}, {"letter": "B", "text": "风因子是指定重量和巡航高度时的最佳顺风风速值，实际风速偏离此值，则巡航性能就会下降"}, {"letter": "C", "text": "风因子是指定重量和巡航高度上，是与无风时最佳巡航高度上具有相同地面航程的顺风风速，若实际风速小于此值，则意味着不能实现最大航程"}, {"letter": "D", "text": "风因子是指定重量和巡航高度上，是与无风时最佳巡航高度上具有相同地面航程的顺风风速，若实际风速大于此值，则意味着不能实现最大航程"}], "answer": "C", "explanation": "", "answers": []}, {"id": 481, "type": "choice", "label": "多选题", "number": 11, "chapter": "第四章改", "stem": "大型民航飞机在巡航过程中，随着燃油消耗飞机重量在不断降低，飞行员若要保证飞机的最远航程性能，可以选择：", "options": [{"letter": "A", "text": "上升高度"}, {"letter": "B", "text": "降低飞行速度"}, {"letter": "C", "text": "增大飞行速度"}, {"letter": "D", "text": "降低飞行高度"}], "answer": "AB", "explanation": "随着重量的减轻，喷气式飞机的远航速度会降低，远航高度会升高，因此选择AB。", "answers": []}, {"id": 482, "type": "fill", "label": "填空题", "number": 12, "chapter": "第四章改", "stem": "使用B777-200巡航飞行的风因子表[S-4-1]： 以0.84M方式进行巡航，巡航重量200,000kg。若已知各高度上实际风的情况如下：FL410逆风40kt；FL390逆风30kt；FL370逆风15kt；FL350顺风0Kt；FL330顺风10Kt。则考虑风速影响后在 高度上巡航更有利。", "options": [], "answer": "FL350", "explanation": "0.84M巡航，重量200,000kg，则由风因子表可得各个高度上实际风与风因子之差（顺风为正，逆风为负）： FL410: -40-30=-70kt FL390: -30-4=-34kt FL370: -15-0=-15kt FL350: 0-12=-12kt FL330: 10-34=-24kt 由上可知，差值最大的是FL350，即在FL350上进行巡航，最为有利。", "answers": ["FL350"]}, {"id": 483, "type": "fill", "label": "填空题", "number": 13, "chapter": "第四章改", "stem": "使用B737-800巡航飞行的风因子表[S-4-6]： 以0.79M方式进行巡航，巡航重量65,000kg，当前巡航高度为FL370，该高度上有逆风20kt。若已知各高度上实际风的情况如下：FL390逆风30kt；FL350逆风15kt；FL330逆风10kt；FL310静风0kt。则考虑风速影响后在 高度上巡航更有利。", "options": [], "answer": "FL350", "explanation": "（1）当前高度FL370，逆风20kt，查表指该高度风因子为0，可知为无风时的最佳巡航高度，然而该高度有逆风20kt，航程缩短。 查表得到其他可选高度的风因子：FL390风因子12，FL350风因子3，FL330风因子16，FL310风因子37； （2）计算可选高度的得失相当风速： FL390: -20 + (12 - 0) = -8 kt; 实际风速为-30kt； FL350: -20 + (3 - 0) = -17 kt; 实际风速为-15kt； FL330: -20 + (16 - 0) = -4 kt; 实际风速为-10kt； FL310: -20 + (37 - 0) = 17 kt; 实际风速为0kt； （3）经比较，可知FL350满足条件（实际风速大于得失相当风速），因此选择FL350巡航更加有利。", "answers": ["FL350"]}, {"id": 484, "type": "fill", "label": "填空题", "number": 14, "chapter": "第四章改", "stem": "使用A320巡航飞行的风因子表[S-4-7]： 以0.78M方式进行巡航，巡航重量70,000kg，当前巡航高度为FL350，该高度上有逆风30kt，试确定： (1) FL330上的得失相当风速为 kt； (2) 如果飞行员考虑降低至FL330进行巡航，且预报中FL330有逆风10kt，那么下降至FL330进行巡航是否更有利？ (是或否)", "options": [], "answer": "-16、是", "explanation": "当前高度FL350有逆风30kt， 从图中查得：FL350风因子为5，FL330风因子为20 则FL330的得失相当风速 = -30 + ( 20 - 5 ) = -15kt。 则，FL330必须有逆风小于15kt或者有顺风时，才更加有利；而预报FL330有逆风10kt，满足要求，因此下降到FL330会更有利。", "answers": ["-16", "是"]}, {"id": 485, "type": "fill", "label": "填空题", "number": 1, "chapter": "第四章改", "stem": "参见图[S-4-8.a]和[S-4-8.b]，已知A320在M.78巡航飞行中某一点检查，飞机重量为70000kg，距离着陆机场1000nm，逆风50kt，巡航高度FL350，温度为ISA，重心位置33%，空调低，发动机防冰开，试确定： 到达着陆机场所需的燃油 = kg (四舍五入，取整数)； 到达着陆机场所需的时间 = 小时 分钟。", "options": [], "answer": "5878、2、39", "explanation": "参照图[S-5-8.a]找到地面距离1000nm和逆风50kt时的空中距离为1125nm； 参照图[S-5-8.b]找到空中距离1125nm和巡航高度为FL350时的基准所需油耗为5395kg，所需时间为2小时39分， 空中距离1125nm和FL330~FL350巡航高度时的重量影响燃油修正值为34kg/1000kg， 检查时的重量为70000kg，而基准重量为60000kg，超出10000kg，因此燃油修正量为34*10000/1000 = 340kg 修正重量后的所需燃油 = 5395 + 340 = 5735kg。 空调低、发动机防冰开的修正为-0.5% + 3% = 2.5% 因此，最终修正后的所需燃油 = 5735 * (1 + 2.5%) = 5878.375kg。", "answers": ["5878", "2", "39"]}, {"id": 486, "type": "fill", "label": "填空题", "number": 2, "chapter": "第四章改", "stem": "参见图[S-4-9.a]和[S-4-9.b]，已知B737-800以LRC方式巡航，巡航高度FL350，在某一点开始检查，此时重量为170000LB，距离着陆机场1600nm，顺风60kt，试估计出： 到达着陆机场所需的燃油 = LB； 到达着陆机场所需的时间 = 小时 分钟。", "options": [], "answer": "17400-17600、3、22", "explanation": "参照图[S-5-9.a]，找到地面距离1600nm和顺风60kt时的空中距离为1405nm，约等于1400nm； 参照图[S-5-9.b]，找到空中距离1400nm和巡航高度FL350时的基准燃油为14.1×1000 LB，基准时间为3:22，即3小时22分； 参照图[S-5-9.b]下方的燃油修正量，找到燃油14.1×1000 LB和飞机重量170×1000 LB时的燃油修正量，需要进行差值： (3.5-2.4)/(15-10)×(14.1 - 10) + 2.4 = 3.302 KLB 因此，所需燃油 = 14.1 + 3.302 = 17.402 KLB = 17.402×1000 LB = 17402 LB； 所需时间 = 3小时22分。", "answers": ["17400-17600", "3", "22"]}, {"id": 487, "type": "choice", "label": "单选题", "number": 1, "chapter": "第四章改", "stem": "若爬升或巡航阶段在山区上空发生发动机故障，应该采用障碍物策略或飘降策略，剩余的发动机选择：", "options": [{"letter": "A", "text": "最大起飞/复飞工作状态（TO/GA）"}, {"letter": "B", "text": "最大巡航工作状态（MCR）"}, {"letter": "C", "text": "最大上升（爬上）工作状态（MCL）"}, {"letter": "D", "text": "最大连续推力(MCT)"}], "answer": "D", "explanation": "", "answers": []}, {"id": 488, "type": "choice", "label": "单选题", "number": 2, "chapter": "第四章改", "stem": "无返回点（no-return point） 是指在航线上飞机单发失效后，在该点如果想返回，则其净航迹能以不低于 2000ft 的裕度（改平飞处不低于 1000ft） 越过最高的障碍物，而在该点之后若想返回时，就不能保证满足净航迹越障裕度要求， 因此无返回点是：", "options": [{"letter": "A", "text": "满足单发飘降越障要求的检查点， 在其后飞机就不能返回的点，是单发失效后飞机可以返回起飞机场的最远点。"}, {"letter": "B", "text": "满足单发飘降越障要求的检查点， 在该点之前飞机不能返回的点，是单发失效后飞机可以返回起飞机场的最近点。"}, {"letter": "C", "text": "考虑单发失效时剩余燃油的检查点， 在其后飞机就不能返回的点，是单发失效后飞机可以返回起飞机场的最远点。"}, {"letter": "D", "text": "考虑单发失效后飞行时间的检查点， 在其后飞机就不能返回的点，是单发失效后飞机可以返回起飞机场的最远点。"}], "answer": "A", "explanation": "", "answers": []}, {"id": 489, "type": "choice", "label": "单选题", "number": 3, "chapter": "第四章改", "stem": "返航点(PSR:Point of Safe Return)是指若在该点飞机单发失效，消耗掉全部剩余燃油（保留储备燃油），", "options": [{"letter": "A", "text": "飞机能返回到出发机场最远的检查点"}, {"letter": "B", "text": "飞机能返回到出发机场最近的检查点"}, {"letter": "C", "text": "飞机能飞往目的地机场最远的检查点"}, {"letter": "D", "text": "飞机能飞往目的地机场最近的检查点"}], "answer": "A", "explanation": "", "answers": []}, {"id": 490, "type": "choice", "label": "单选题", "number": 4, "chapter": "第四 let filter = 'all';
let studyMode = false;
let randomMode = false;
let currentIndex = 0;
let filteredQuestions = [];
let answers = {};
let submitted = {};

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function applyFilter() {
  let qs = QUESTIONS;
  if (filter !== 'all') qs = qs.filter(q => q.type === filter);
  filteredQuestions = randomMode ? shuffle(qs) : [...qs];
  currentIndex = 0;
  render();
}

function countStats(qs) {
  let correct = 0, wrong = 0, skip = 0, total = qs.length;
  for (const q of qs) {
    if (!(q.id in submitted)) { skip++; continue; }
    const user = answers[q.id];
    const ok = isAnswerCorrect(q, user);
    if (ok === true) correct++;
    else if (ok === false) wrong++;
  }
  const done = correct + wrong;
  const rate = done > 0 ? Math.round(correct / done * 100) : 0;
  return { total, correct, wrong, skip, done, rate };
}

function updateStats() {
  const fs = countStats(filteredQuestions);
  document.getElementById('stat-total').textContent = fs.total;
  document.getElementById('stat-correct').textContent = fs.correct;
  document.getElementById('stat-wrong').textContent = fs.wrong;
  document.getElementById('stat-skip').textContent = fs.skip;
  document.getElementById('progress-bar').style.width = fs.total ? Math.round((fs.done + fs.skip) / fs.total * 100) + '%' : '0%';
  const types = ['choice', 'fill', 'tf'];
  const labels = { choice: '选择', fill: '填空', tf: '判断' };
  for (const t of types) {
    const ts = countStats(QUESTIONS.filter(q => q.type === t));
    const el = document.getElementById('acc-' + t);
    if (el) {
      el.textContent = ts.done > 0 ? ts.rate + '%' : '-';
      el.className = 'acc-val ' + (ts.done > 0 ? (ts.rate >= 80 ? 'acc-good' : ts.rate >= 60 ? 'acc-ok' : 'acc-bad') : '');
    }
  }
  const all = countStats(QUESTIONS);
  const elAll = document.getElementById('acc-all');
  if (elAll) {
    elAll.textContent = all.done > 0 ? all.rate + '%' : '-';
    elAll.className = 'acc-val ' + (all.done > 0 ? (all.rate >= 80 ? 'acc-good' : all.rate >= 60 ? 'acc-ok' : 'acc-bad') : '');
  }
}

function isAnswerCorrect(q, user) {
  if (q.type === 'choice') return user === q.answer;
  if (q.type === 'tf') return user === q.answer;
  if (q.type === 'fill') {
    if (!user || !q.answers) return false;
    return q.answers.every((a, i) => (user[i] || '').trim() === a.trim());
  }
  return null;
}

function renderQuestion(q) {
  const isDone = q.id in submitted;
  const userAns = answers[q.id];
  const showAnswer = studyMode || isDone;
  const typeLabels = { choice: '选择题', fill: '填空题', tf: '判断题' };

  let html = '<div class="card">';
  html += '<div class="q-meta">';
  html += `<span class="q-type ${q.type}">${q.label || typeLabels[q.type]}</span>`;
  html += `<span class="q-number">第 ${randomMode ? (currentIndex + 1) : q.number} 题</span>`;
  if (q.chapter) html += `<span class="q-chapter">${q.chapter}</span>`;
  if (studyMode) html += '<span class="q-study-badge">📖 背题</span>';
  html += '</div>';
  html += `<div class="q-stem">${q.stem}</div>`;

  if (q.type === 'choice') {
    html += '<div class="options">';
    const multiHint = q.label && q.label.includes('多选') ? ' <small style="color:#999">(多选)</small>' : '';
    for (const opt of q.options) {
      let cls = 'option';
      if (showAnswer && q.answer.includes(opt.letter)) cls += ' correct';
      if (isDone && (userAns || '').includes(opt.letter) && !q.answer.includes(opt.letter)) cls += ' wrong';
      if (!isDone && !studyMode && (userAns || '').includes(opt.letter)) cls += ' selected';
      html += `<div class="${cls}" data-value="${opt.letter}">
        <span class="letter">${opt.letter}.</span><span>${opt.text}</span>
        ${showAnswer && q.answer.includes(opt.letter) ? '<span class="ans-tag">✓ 答案</span>' : ''}
      </div>`;
    }
    html += '</div>';
    if (showAnswer) {
      html += `<div class="result show correct"><span class="icon-ok">&#x2714;</span> 正确答案：<strong>${q.answer}</strong></div>`;
    } else if (isDone) {
      const ok = isAnswerCorrect(q, userAns);
      html += `<div class="result show ${ok ? 'correct' : 'wrong'}">
        ${ok ? 'OK: 正确！' : 'X 错误，正确答案是 ' + q.answer}
      </div>`;
    }
  } else if (q.type === 'tf') {
    html += '<div class="tf-btns">';
    for (const val of ['对', '错']) {
      let cls = '';
      if (showAnswer && val === q.answer) cls = ' correct';
      if (isDone && userAns === val && val !== q.answer) cls = ' wrong';
      if (!isDone && !studyMode && userAns === val) cls = ' selected';
      html += `<button class="${cls}" data-value="${val}">${val === '对' ? '✓' : '✗'} ${val}${showAnswer && val === q.answer ? ' · 答案' : ''}</button>`;
    }
    html += '</div>';
    if (showAnswer) {
      html += `<div class="result show correct"><span class="icon-ok">&#x2714;</span> 正确答案：<strong>${q.answer}</strong></div>`;
    } else if (isDone) {
      const ok = userAns === q.answer;
      html += `<div class="result show ${ok ? 'correct' : 'wrong'}">
        ${ok ? 'OK: 正确！' : 'X 错误，正确答案是 ' + q.answer}
      </div>`;
    }
  } else if (q.type === 'fill') {
    const blanks = (q.stem.match(/____|—+/g) || []).length || 1;
    html += '<div class="fill-group">';
    for (let i = 0; i < blanks; i++) {
      const showAns = showAnswer && q.answers && q.answers[i];
      const val = showAns ? q.answers[i] : ((isDone && userAns) ? userAns[i] || '' : (userAns ? userAns[i] || '' : ''));
      const disabled = showAnswer ? 'disabled' : (isDone ? 'disabled' : '');
      html += `<input class="${showAnswer ? 'fill-input fill-answer' : 'fill-input'}" placeholder="空 ${i+1}" data-idx="${i}" value="${escHtml(val)}" ${disabled}>`;
    }
    html += '</div>';
    if (showAnswer && q.answers) {
      html += `<div class="result show correct">OK: 答案：<strong>${q.answers.join('、')}</strong></div>`;
    }
  }

  // Explanation — show only after submission or in study mode
  if (q.explanation && showAnswer) {
    html += `<div class="explanation show">💡 解析：${q.explanation}</div>`;
  }

  html += '</div>';
  html += '<div class="actions">';
  if (currentIndex > 0) html += '<button class="btn btn-outline" id="btn-prev">← 上一题</button>';
  if (!studyMode && !isDone) {
    html += '<button class="btn btn-primary" id="btn-submit">✓ 提交</button>';
    html += '<button class="btn btn-outline" id="btn-reveal">💡 看答案</button>';
  }
  if (currentIndex < filteredQuestions.length - 1) {
    const nextLabel = (!studyMode && !isDone) ? '跳过 →' : '下一题 →';
    html += `<button class="btn btn-outline" id="btn-next">${nextLabel}</button>`;
  }
  html += '</div>';

  const fs2 = countStats(filteredQuestions);
  if (fs2.done + fs2.skip === fs2.total && fs2.total > 0) {
    html += '<div class="actions"><button class="btn btn-primary" id="btn-review-all">📊 查看全部结果</button></div>';
  }
  return html;
}

function render() {
  if (filteredQuestions.length === 0) {
    document.getElementById('quiz-area').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>没有题目</p></div>';
    document.getElementById('review-area').style.display = 'none';
    updateStats();
    return;
  }
  document.getElementById('review-area').style.display = 'none';
  const q = filteredQuestions[currentIndex];
  document.getElementById('quiz-area').innerHTML = renderQuestion(q);
  bindEvents(q);
  updateStats();
}

function bindEvents(q) {
  // Multi-select support for choice
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      if (q.id in submitted) return;
      const isMulti = q.label && q.label.includes('多选');
      if (isMulti) {
        el.classList.toggle('selected');
        const sel = [...document.querySelectorAll('.option.selected')].map(e => e.dataset.value).sort().join('');
        answers[q.id] = sel || undefined;
      } else {
        document.querySelectorAll('.option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        answers[q.id] = el.dataset.value;
      }
    });
  });

  document.querySelectorAll('.tf-btns button').forEach(el => {
    el.addEventListener('click', () => {
      if (q.id in submitted) return;
      document.querySelectorAll('.tf-btns button').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      answers[q.id] = el.dataset.value;
    });
  });

  document.querySelectorAll('.fill-input').forEach(input => {
    input.addEventListener('input', () => {
      const idx = parseInt(input.dataset.idx);
      if (!answers[q.id]) answers[q.id] = [];
      answers[q.id][idx] = input.value;
    });
  });

  document.getElementById('btn-submit')?.addEventListener('click', () => submit(q));
  document.getElementById('btn-reveal')?.addEventListener('click', () => {
    delete answers[q.id];
    submitted[q.id] = true;
    render();
  });

  document.getElementById('btn-prev')?.addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; render(); }
  });
  document.getElementById('btn-next')?.addEventListener('click', () => {
    if (currentIndex < filteredQuestions.length - 1) { currentIndex++; render(); }
  });
  document.getElementById('btn-review-all')?.addEventListener('click', showReview);

  document.removeEventListener('keydown', handleKeyboard);
  document.addEventListener('keydown', handleKeyboard);
}

function handleKeyboard(e) {
  const q = filteredQuestions[currentIndex];
  if (!q) return;
  if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); submit(q); }
  else if (e.key === 'ArrowRight' && currentIndex < filteredQuestions.length - 1) { e.preventDefault(); currentIndex++; render(); }
  else if (e.key === 'ArrowLeft' && currentIndex > 0) { e.preventDefault(); currentIndex--; render(); }
  else if (q.type === 'choice' && !(q.id in submitted)) {
    const key = e.key.toUpperCase();
    const isMulti = q.label && q.label.includes('多选');
    if (['A','B','C','D','E','F','G','H'].includes(key)) {
      e.preventDefault();
      if (isMulti) {
        const cur = answers[q.id] || '';
        const has = cur.includes(key);
        if (has) { answers[q.id] = cur.replace(key, '').split('').sort().join('') || undefined; }
        else { answers[q.id] = (cur + key).split('').sort().join(''); }
      } else {
        answers[q.id] = key;
      }
      render();
    }
  }
}

function submit(q) {
  submitted[q.id] = true;
  render();
}

function showReview() {
  document.getElementById('review-area').style.display = 'block';
  let html = '<div class="review"><h2>📊 答题报告</h2>';
  let correct = 0, wrong = 0;
  for (let i = 0; i < filteredQuestions.length; i++) {
    const q = filteredQuestions[i];
    const done = q.id in submitted;
    const user = answers[q.id];
    const ok = done ? isAnswerCorrect(q, user) : null;
    let cls = 'r-skip';
    if (done && ok === true) { cls = 'r-correct'; correct++; }
    else if (done && ok === false) { cls = 'r-wrong'; wrong++; }
    const displayNum = randomMode ? (i + 1) : q.number;
    html += `<div class="review-item ${cls}">`;
    html += `<div class="review-q"><strong>${displayNum}.</strong> ${q.stem.substring(0, 80)}...</div>`;
    if (q.type === 'choice') {
      html += `<div class="review-answer"><span class="icon-ok">&#x2714;</span> 正确答案：${q.answer}</div>`;
      if (done && user !== q.answer) html += `<div class="review-your">X 你的答案：${user || '(未选)'}</div>`;
    } else if (q.type === 'tf') {
      html += `<div class="review-answer"><span class="icon-ok">&#x2714;</span> 正确答案：${q.answer}</div>`;
      if (done && user !== q.answer) html += `<div class="review-your">X 你的答案：${user || '(未选)'}</div>`;
    } else if (q.type === 'fill') {
      html += `<div class="review-answer"><span class="icon-ok">&#x2714;</span> 正确答案：${(q.answers || []).join('、')}</div>`;
      if (done && user) html += `<div class="review-your">📝 你的答案：${Array.isArray(user) ? user.join('、') : user}</div>`;
    }
    if (q.explanation) html += `<div style="color:#0369a1;font-size:12px;margin-top:4px;">💡 ${q.explanation}</div>`;
    if (!done) html += '<div style="color:#f59e0b;font-size:13px;">⏭️ 未作答</div>';
    html += '</div>';
  }
  const total = filteredQuestions.length;
  html += `<div style="text-align:center;margin-top:20px;font-size:18px;">🎯 正确率：<strong>${total ? Math.round(correct / (correct + wrong || 1) * 100) : 0}%</strong>（${correct}/${correct + wrong}）</div>`;
  html += '</div><div class="actions" style="margin-top:20px;"><button class="btn btn-outline" id="btn-back-quiz">返回刷题</button></div>';
  document.getElementById('quiz-area').innerHTML = html;
  document.getElementById('review-area').style.display = 'none';
  document.getElementById('btn-back-quiz')?.addEventListener('click', () => render());
}

// Filter buttons
document.querySelectorAll('#filters button[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filters button[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    applyFilter();
  });
});

// Study toggle
document.getElementById('btn-study')?.addEventListener('click', function() {
  studyMode = !studyMode;
  this.classList.toggle('active', studyMode);
  this.textContent = studyMode ? '📝 刷题' : '📖 背题';
  updateModeIndicator();
  answers = {}; submitted = {};
  currentIndex = 0;
  render();
});

// Random toggle
document.getElementById('btn-random')?.addEventListener('click', function() {
  randomMode = !randomMode;
  this.classList.toggle('active', randomMode);
  this.textContent = randomMode ? '📋 顺序' : '🔀 乱序';
  updateModeIndicator();
  answers = {}; submitted = {};
  applyFilter();
});

// Reset
document.getElementById('btn-reset')?.addEventListener('click', () => {
  answers = {}; submitted = {};
  applyFilter();
});

// Jump
document.getElementById('btn-jump')?.addEventListener('click', () => {
  const inp = document.getElementById('jump-input');
  const num = parseInt(inp.value);
  if (!num) return;
  let idx;
  if (randomMode) {
    idx = (num >= 1 && num <= filteredQuestions.length) ? num - 1 : -1;
  } else {
    idx = filteredQuestions.findIndex(q => q.number === num);
  }
  if (idx >= 0) { currentIndex = idx; render(); inp.value = ''; }
  else { inp.style.borderColor = '#dc2626'; setTimeout(() => { inp.style.borderColor = ''; }, 600); }
});
document.getElementById('jump-input')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btn-jump')?.click();
});

function updateModeIndicator() {
  const ind = document.getElementById('mode-indicator');
  if (!ind) return;
  const mode = studyMode ? '📖 背题模式' : '📝 刷题模式';
  const order = randomMode ? '乱序' : '顺序';
  ind.textContent = `当前：${mode} · ${order}`;
  ind.className = 'mode-indicator ' + (studyMode ? 'study' : 'quiz');
}

// Init
applyFilter();
</script>
</body>
</html>
