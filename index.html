ext": "升高"}], "answer": "D", "explanation": "密度高度与气压高度相似，是根据大气密度值由标准大气密度变化规律计算得到的高度。", "answers": []}, {"id": 6, "type": "choice", "label": "单选题", "number": 7, "chapter": "第一章 基础知识", "stem": "测得某飞机在飞行高度上的气压为30742.9Pa，与ISA条件下9000m高度上的大气压相同，但此时的ISA偏差是ISA+20，那么飞机的绝对高度（ ）9000m。", "options": [{"letter": "A", "text": "不能确定"}, {"letter": "B", "text": "小于"}, {"letter": "C", "text": "大于"}, {"letter": "D", "text": "等于"}], "answer": "C", "explanation": "几何高度与气压高度的关系：", "answers": []}, {"id": 7, "type": "choice", "label": "单选题", "number": 8, "chapter": "第一章 基础知识", "stem": "测得某飞机在飞行高度上的气压为30742.9Pa，与ISA条件下9000m高度上的大气压相同，但此时的ISA偏差是ISA+20，那么飞机高度表上的读数（ ）9000m。", "options": [{"letter": "A", "text": "大于"}, {"letter": "B", "text": "小于"}, {"letter": "C", "text": "等于"}, {"letter": "D", "text": "不能确定"}], "answer": "C", "explanation": "高度表的读数是由测量得到外界气压(静压)根据国际标准大气条件计算得到的对应高度(基准面为QNE 1013hpa)，即，此高度值只跟外界大气压力(静压)有关。", "answers": []}, {"id": 8, "type": "choice", "label": "单选题", "number": 9, "chapter": "第一章 基础知识", "stem": "低速流动中，在机翼前缘附近的驻点处，总压等于（ ）。", "options": [{"letter": "A", "text": "静压"}, {"letter": "B", "text": "负压"}, {"letter": "C", "text": "正压"}, {"letter": "D", "text": "动压"}], "answer": "A", "explanation": "机翼表面的驻点处，气流流速为0，即动压为0，此时的总压就等于静压（伯努利定理）。", "answers": []}, {"id": 9, "type": "choice", "label": "单选题", "number": 10, "chapter": "第一章 基础知识", "stem": "高速流动中，皮托管内薄膜所感受的滞止压力（ ）静压与动压之和。", "options": [{"letter": "A", "text": "大于"}, {"letter": "B", "text": "不能确定"}, {"letter": "C", "text": "小于"}, {"letter": "D", "text": "等于"}], "answer": "A", "explanation": "高速流动时，由于空气的可压缩性，气流受阻时被压缩时内能增加，会产生额外的压力，因此皮托管内薄膜处的滞止压力(也就是总压或全压)，是大于静压与动压之和的。", "answers": []}, {"id": 10, "type": "choice", "label": "单选题", "number": 11, "chapter": "第一章 基础知识", "stem": "当飞行员操纵飞机保持IAS=280kt从10,000ft爬升至25,000ft的过程中，EAS如何变化？", "options": [{"letter": "A", "text": "先减小后增大"}, {"letter": "B", "text": "不断增大"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不断减小"}], "answer": "D", "explanation": "IAS=250kt，且高于标准海平面，速度较快，必须考虑空气可压缩性，EAS与CAS是不等的。", "answers": []}, {"id": 11, "type": "choice", "label": "单选题", "number": 12, "chapter": "第一章 基础知识", "stem": "当飞行员操纵飞机保持IAS=280kt从10,000ft爬升至25,000ft的过程中，TAS如何变化？", "options": [{"letter": "A", "text": "不能确定"}, {"letter": "B", "text": "不变"}, {"letter": "C", "text": "不断增大"}, {"letter": "D", "text": "不断减小"}], "answer": "C", "explanation": "保持CAS不变进行爬升时，空气密度减小，气压降低，空气更加稀薄，飞机需要更大的真空速才能保持总压与静压之差不变(虽然随着高度的增加，静压降低，总压也需要降低，但是所需要的真空速还是增加的，否则无法保证两者之差不变)", "answers": []}, {"id": 12, "type": "choice", "label": "单选题", "number": 13, "chapter": "第一章 基础知识", "stem": "当飞行员操纵飞机保持IAS=280kt从10,000ft爬升至25,000ft的过程中，马赫数如何变化？", "options": [{"letter": "A", "text": "不变"}, {"letter": "B", "text": "不断减小"}, {"letter": "C", "text": "不断增加"}, {"letter": "D", "text": "不能确定"}], "answer": "C", "explanation": "保持IAS爬升时，随着高度的升高，TAS是一直增大的，同时气温降低，音速减小，因此对应的马赫数必然是增加的。", "answers": []}, {"id": 13, "type": "choice", "label": "单选题", "number": 14, "chapter": "第一章 基础知识", "stem": "关于指示空速IAS、校正空速CAS、当量空速EAS，以下说法正确的是：", "options": [{"letter": "A", "text": "校正空速CAS是空速表读数通过校正后得到的标准海平面上的真空速TAS"}, {"letter": "B", "text": "当量空速EAS严格来说只取决于来流动压，而且总是大于校正空速CAS和指示空速IAS"}, {"letter": "C", "text": "指示空速IAS是真空速TAS在空速表上的读数"}, {"letter": "D", "text": "校正空速CAS严格来说取决于来流动压，因此它总是小于真空速TAS"}, {"letter": "E", "text": "指示空速IAS严格来说只取决于来流动压，与空气压缩性无关"}, {"letter": "F", "text": "指示空速IAS是校正空速CAS在空速表的读数，空速表的目的是指示校正空速CAS"}], "answer": "F", "explanation": "1 指示空速IAS仅仅是空速表的读数，空速表的目的是显示校正空速CAS，同时空速表受自身显示误差和压力误差影响，因此IAS与CAS相比通常存在或多或少的误差，可以这么认为：IAS是CAS在空速表上的读数，CAS是精确理论值，IAS是仪表显示值；在现代数字化航电系统中，由于使用了大气数据计算机（ADC），它可以自动修正误差，因此得到的IAS精度往往非常高，非常接近CAS。在绝大多数的应用分析场景中（不考虑空速表误差以及全静压系统故障情况），可以将CAS与IAS互换。", "answers": []}, {"id": 14, "type": "choice", "label": "单选题", "number": 15, "chapter": "第一章 基础知识", "stem": "在侧风起飞的四发飞机,哪个是关键发动机?", "options": [{"letter": "A", "text": "上风内侧"}, {"letter": "B", "text": "上风外侧"}, {"letter": "C", "text": "下风外侧"}], "answer": "B", "explanation": "A", "answers": []}, {"id": 15, "type": "choice", "label": "单选题", 即使发动机性能足够，也无法实现飞机稳定飞行（即必然失速）？", "options": [{"letter": "A", "text": "1.3g抖振升限"}, {"letter": "B", "text": "实用升限"}, {"letter": "C", "text": "理论升限"}, {"letter": "D", "text": "气动升限"}], "answer": "D", "explanation": "", "answers": []}, {"id": 22, "type": "choice", "label": "单选题", "number": 23, "chapter": "第一章 基础知识", "stem": "对于高亚音速运输机，其所选的飞行高度层越高，其抖振裕度范围（即飞行马赫数可选范围）：", "options": [{"letter": "A", "text": "越广"}, {"letter": "B", "text": "不受飞行高度影响"}, {"letter": "C", "text": "越窄"}, {"letter": "D", "text": "无法确定"}], "answer": "C", "explanation": "", "answers": []}, {"id": 23, "type": "choice", "label": "单选题", "number": 24, "chapter": "第一章 基础知识", "stem": "对于高亚音速运输机，其重心位置越靠前（在重心安全范围之内），在相同飞行高度层上的抖振裕度范围（即飞行马赫数的可选范围）：", "options": [{"letter": "A", "text": "不受重心位置影响"}, {"letter": "B", "text": "越窄"}, {"letter": "C", "text": "无法确定"}, {"letter": "D", "text": "越广"}], "answer": "B", "explanation": "", "answers": []}, {"id": 24, "type": "choice", "label": "单选题", "number": 25, "chapter": "第一章 基础知识", "stem": "已知某B737-800，飞行高度为FL360，重量为160,000LB，重心位置25%MAC，最大允许马赫数MMO为M0.82，从抖振开始边界图表（BOB Chart）中查得在载荷因数为1.3时的低速抖振马赫数为M0.73，高速抖振马赫数为M0.81，则该B737-800飞机在这种条件下可选的巡航马赫数范围为（ ）。", "options": [{"letter": "A", "text": "M0.4 ~ M0.82"}, {"letter": "B", "text": "M0.4 ~ M0.73"}, {"letter": "C", "text": "M0.73 ~ M0.81"}, {"letter": "D", "text": "M0.73 ~ M0.82"}], "answer": "C", "explanation": "", "answers": []}, {"id": 25, "type": "choice", "label": "单选题", "number": 1, "chapter": "第三章 爬升与下降性能", "stem": "在飞机平飞、上升和下降时的受力分析中，将飞机看作一个质点的前提条件是：", "options": [{"letter": "A", "text": "作用在重心的合力为零"}, {"letter": "B", "text": "各力的作用点在重心上"}, {"letter": "C", "text": "飞机的形心与重心重合"}, {"letter": "D", "text": "绕重心的合力矩为零"}], "answer": "D", "explanation": "把飞机作为质点的前提是飞机的姿态稳定，即合力矩为零", "answers": []}, {"id": 26, "type": "choice", "label": "单选题", "number": 2, "chapter": "第三章 爬升与下降性能", "stem": "当飞机起飞重量增加并以相同的速度进行巡航时，关于其所受阻力的变化，以下说法正确的是:", "options": [{"letter": "A", "text": "飞机重量增加时，废阻力基本不变，诱导阻力增大，总阻力增大"}, {"letter": "B", "text": "飞机重量增加时，废阻力增大，诱导阻力基本不变，总阻力增大"}, {"letter": "C", "text": "飞机重量增加时，废阻力减小，诱导阻力增大，总阻力依然增大"}, {"letter": "D", "text": "飞机重量增加时，废阻力增大，诱导阻力增大，总阻力增大"}], "answer": "A", "explanation": "在给定速度下,重量增加时,飞机为维持平飞需要更大的升力,即所需升力系数增大,则诱导阻力系数也会增加,即诱导阻力增大;同时,废阻力的阻力系数(零升阻力系数)在临界迎角范围内只取决于机翼形状,而不受重量的影响,即废阻力并不会发生改变。因此,总阻力必然增大。", "answers": []}, {"id": 27, "type": "choice", "label": "单选题", "number": 3, "chapter": "第三章 爬升与下降性能", "stem": "飞机分别在重量减轻和放下襟翼两种情况下，其对应的最小阻力速度VMD分别如何变化?( )", "options": [{"letter": "A", "text": "在重量减轻和放下襟翼时，VMD都减小"}, {"letter": "B", "text": "在重量减轻时，VMD增大;在放下襟翼时，VMD减小"}, {"letter": "C", "text": "在重量减轻和放下襟翼时，VMD都增大"}, {"letter": "D", "text": "在重量减轻时，VMD减小;在放下襟翼时，VMD增大"}], "answer": "A", "explanation": "", "answers": []}, {"id": 28, "type": "choice", "label": "单选题", "number": 4, "chapter": "第三章 爬升与下降性能", "stem": "大型民用喷气式飞机常以（ ）为界把平飞速度范围分为两个速度范围。", "options": [{"letter": "A", "text": "失速速度VS1g"}, {"letter": "B", "text": "最小阻力速度VMD"}, {"letter": "C", "text": "最小功率速度VMP"}, {"letter": "D", "text": "远航速度VMRC"}], "answer": "B", "explanation": "", "answers": []}, {"id": 29, "type": "choice", "label": "单选题", "number": 5, "chapter": "第三章 爬升与下降性能", "stem": "关于平飞速度范围与速度稳定性，以下说法正确的是：", "options": [{"letter": "A", "text": "无论在第一速度范围还是第二速度范围，飞机都具有速度稳定性"}, {"letter": "B", "text": "在第一速度范围内，飞机具有速度稳定性"}, {"letter": "C", "text": "在第二速度范围内，飞机具有速度稳定性"}, {"letter": "D", "text": "飞机在最后进近阶段、放下襟翼后，由于失速速速减小，将容易失去速度稳定性"}], "answer": "B", "explanation": "当油门位置不变时，在第一速度范围内，当飞机受到扰动使得空速增加时，总阻力增大，又使得空速减小，回到原来的空速。这种特性称为速度稳定性，即飞机在第一速度范围内是拥有速度稳定性的。", "answers": []}, {"id": 30, "type": "choice", "label": "单选题", "number": 6, "chapter": "第三章 爬升与下降性能", "stem": "上升角是：", "options": [{"letter": "A", "text": "飞机的仰角"}, {"letter": "B", "text": "上升时飞机的仰角减去平飞时飞机的仰角"}, {"letter": "C", "text": "飞机上升轨迹与水平面之间的夹角"}, {"letter": "D", "text": "飞机轨迹与相对气流之间的夹角"}], "answer": "C", "explanation": "", "answers": []}, {"id": 31, "type": "choice", "label": "单选题", "number": 7, "chapter": "第三章 爬升与下降性能", "stem": "飞机进行定常上升时的升力（ ）平飞时的升力。", 章 爬升与下降性能", "stem": "通常情况下，现代大型民航飞机的陡升速度Vx（ ）快升速度Vy。", "options": [{"letter": "A", "text": "大于"}, {"letter": "B", "text": "等于"}, {"letter": "C", "text": "小于"}], "answer": "C", "explanation": "", "answers": []}, {"id": 38, "type": "choice", "label": "单选题", "number": 14, "chapter": "第三章 爬升与下降性能", "stem": "当重量增加时，喷气式飞机的最大上升率（ ），快升速度VY（ ）。", "options": [{"letter": "A", "text": "减小，减小"}, {"letter": "B", "text": "增大，增大"}, {"letter": "C", "text": "减小，增大"}, {"letter": "D", "text": "增大，减小"}], "answer": "C", "explanation": "重量增加时，所需功率曲线会向右上移动，最大剩余功率减小，最大上升率减小，且对应的速度即VY增大，主要是由于诱导阻力(Induced Drag)的增加而造成的。", "answers": []}, {"id": 39, "type": "choice", "label": "单选题", "number": 15, "chapter": "第三章 爬升与下降性能", "stem": "打开大角度襟翼后，喷气式飞机的爬升梯度（ ），陡升速度VX（ ）。", "options": [{"letter": "A", "text": "减小，增大"}, {"letter": "B", "text": "减小，减小"}, {"letter": "C", "text": "增大，减小"}, {"letter": "D", "text": "增大，增大"}], "answer": "B", "explanation": "如果飞机打开襟翼或放下起落架，即非光洁构型(Dirty)，总阻力曲线会向左上方移动，使得最小阻力速度VMD减小，这是由于废阻力(Parasite Drag)的增加引起的。", "answers": []}, {"id": 40, "type": "choice", "label": "单选题", "number": 16, "chapter": "第三章 爬升与下降性能", "stem": "随着高度的升高，喷气式飞机的陡升速度VX(IAS)将（ ），快升速度VY(IAS)将（ ）。", "options": [{"letter": "A", "text": "减小，减小"}, {"letter": "B", "text": "减小，增大"}, {"letter": "C", "text": "增大，增大"}, {"letter": "D", "text": "增大，减小"}, {"letter": "E", "text": "不变，减小"}], "answer": "E", "explanation": "", "answers": []}, {"id": 41, "type": "choice", "label": "单选题", "number": 17, "chapter": "第三章 爬升与下降性能", "stem": "水平气流对飞机上升率的影响是：", "options": [{"letter": "A", "text": "使上升率减小"}, {"letter": "B", "text": "不一定，视顺风和逆风而定"}, {"letter": "C", "text": "没有影响"}, {"letter": "D", "text": "使上升率增大"}], "answer": "C", "explanation": "", "answers": []}, {"id": 42, "type": "choice", "label": "单选题", "number": 18, "chapter": "第三章 爬升与下降性能", "stem": "当飞机带动力下降时（第一速度范围），重量越重，则相同速度的下降梯度：", "options": [{"letter": "A", "text": "保持不变"}, {"letter": "B", "text": "增大"}, {"letter": "C", "text": "减小"}, {"letter": "D", "text": "不能确定"}], "answer": "C", "explanation": "飞机有动力下降时，如果下降速度大于VMD(高速下降)，此时寄生阻力在总阻力中占比较大，重量增加，相同速度时的寄生阻力变化并不大，虽然总阻力会有所增加，但增加幅度低于重量的增加，最终使得下降角和下降梯度减小。", "answers": []}, {"id": 43, "type": "choice", "label": "单选题", "number": 19, "chapter": "第三章 爬升与下降性能", "stem": "当飞机无动力下降时，重量越重，则飞机的最小下降梯度:", "options": [{"letter": "A", "text": "不能确定"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "保持不变"}, {"letter": "D", "text": "越大"}], "answer": "C", "explanation": "飞机无动力下降时，最小下降梯度只取决于最大升阻比，而最大升阻比只取决于飞机构型（忽略空气压缩性影响）。因此，无动力下降时的下降梯度与重量无关。", "answers": []}, {"id": 44, "type": "choice", "label": "单选题", "number": 20, "chapter": "第三章 爬升与下降性能", "stem": "飞机保持固定油门设置进行等速直线下降(定常下降)，下降速度越快(第一速度范围)，则下降梯度( )，下降率( )。", "options": [{"letter": "A", "text": "不变，越小"}, {"letter": "B", "text": "越大，越小"}, {"letter": "C", "text": "越大，越大"}, {"letter": "D", "text": "越小，越大"}], "answer": "C", "explanation": "", "answers": []}, {"id": 45, "type": "choice", "label": "单选题", "number": 21, "chapter": "第三章 爬升与下降性能", "stem": "保持相同表速下降,出现了侧滑后,飞机的下降率( )。", "options": [{"letter": "A", "text": "减小"}, {"letter": "B", "text": "增大"}, {"letter": "C", "text": "不变"}], "answer": "B", "explanation": "", "answers": []}, {"id": 46, "type": "choice", "label": "多选题", "number": 22, "chapter": "第三章 爬升与下降性能", "stem": "在理论升限处，大型民航客机的飞行性能特征有：", "options": [{"letter": "A", "text": "爬升率只能小于或等于0"}, {"letter": "B", "text": "平飞速度等于快升速度VY"}, {"letter": "C", "text": "平飞速度等于陡升速度VX"}, {"letter": "D", "text": "必须使用最大油门才能保持平飞"}], "answer": "ABCD", "explanation": "", "answers": []}, {"id": 47, "type": "choice", "label": "多选题", "number": 23, "chapter": "第三章 爬升与下降性能", "stem": "已知某民航客机的爬升速度剖面为320kt/M0.71，若转换高度为27130ft，则下述正确的是：", "options": [{"letter": "A", "text": "在转换高度以下保持IAS等于320kt爬升"}, {"letter": "B", "text": "转换高度为IAS 320kt对应的马赫数刚好等于0.71时的气压高度"}, {"letter": "C", "text": "飞机从10000ft开始爬升至33000ft的过程中，随着高度增加，大气密度的降低，真空速会逐渐增大"}, {"letter": "D", "text": "在转换高度以上保持MACH等于0.71爬升"}], "answer": "BD", "explanation": "爬升速度剖面为320kt/M0.71，意味着：在10000ft以下，必须保持IAS=250kt以下 ": "单选题", "number": 5, "chapter": "第一章改", "stem": "当飞机所在飞行高度上的大气温度升高时，则对应的密度高度（ ）。", "options": [{"letter": "A", "text": "升高"}, {"letter": "B", "text": "降低"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "密度高度与气压高度相似，是根据大气密度值由标准大气密度变化规律计算得到的高度。 气温升高，密度降低，对应的密度高度升高。", "answers": []}, {"id": 120, "type": "choice", "label": "单选题", "number": 6, "chapter": "第一章改", "stem": "机场标高600ft， QNH 等于 997hPa，则QNE等于（ ）。", "options": [{"letter": "A", "text": "977hpa"}, {"letter": "B", "text": "1017hpa"}, {"letter": "C", "text": "1007hpa"}, {"letter": "D", "text": "1013hpa"}], "answer": "D", "explanation": "QNE是一个固定不变的数值，是标准海平面上的大气压，即1013hpa。", "answers": []}, {"id": 121, "type": "choice", "label": "单选题", "number": 7, "chapter": "第一章改", "stem": "机场标高540ft，QFE 等于 997hPa，则在ISA条件下，QNH约等于（ ）。", "options": [{"letter": "A", "text": "977hpa"}, {"letter": "B", "text": "1017hpa"}, {"letter": "C", "text": "1007hpa"}, {"letter": "D", "text": "1013hpa"}], "answer": "B", "explanation": "标高540ft，则机场到平均海平面的高度为540ft，那么场压与平均海平面上气压相差540/27=20hpa，因此QNH=997+20=1017hpa。", "answers": []}, {"id": 122, "type": "choice", "label": "单选题", "number": 8, "chapter": "第一章改", "stem": "已知机场标高为5000ft，温度ISA+20，则机场气压高度（ ）。", "options": [{"letter": "A", "text": "大于5000ft"}, {"letter": "B", "text": "小于5000ft"}, {"letter": "C", "text": "等于5000ft"}, {"letter": "D", "text": "不能确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 123, "type": "choice", "label": "单选题", "number": 9, "chapter": "第一章改", "stem": "已知飞机按照气压高度10000ft飞行时，温度ISA-20，则距离平均海平面的高度（ ）。", "options": [{"letter": "A", "text": "大于10000ft"}, {"letter": "B", "text": "小于10000ft"}, {"letter": "C", "text": "等于10000ft"}, {"letter": "D", "text": "不能确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 124, "type": "choice", "label": "单选题", "number": 11, "chapter": "第一章改", "stem": "已知某机场标高为600ft，报告的QNH等于1020hPa，则可知此时机场的标准气压高度（ ）。", "options": [{"letter": "A", "text": "大于600ft"}, {"letter": "B", "text": "小于600ft"}, {"letter": "C", "text": "等于600ft"}], "answer": "B", "explanation": "QNH=1020hPa>1013hPa，说明标准海平面(SSL)在平均海平面(MSL)以上，所以可判断出机场标准气压高度会小于机场标高600ft。", "answers": []}, {"id": 125, "type": "choice", "label": "单选题", "number": 12, "chapter": "第一章改", "stem": "已知飞机的气压高度为30,000 ft，海拔高度为31,000 ft，外界温度为 −35℃，则飞机所处大气环境的ISA偏差为（ ）。", "options": [{"letter": "A", "text": "ISA + 10 ℃"}, {"letter": "B", "text": "ISA − 10 ℃"}, {"letter": "C", "text": "ISA + 12 ℃"}, {"letter": "D", "text": "ISA − 12 ℃"}], "answer": "A", "explanation": "", "answers": []}, {"id": 126, "type": "choice", "label": "单选题", "number": 13, "chapter": "第一章改", "stem": "关于国际标准大气ISA，下面说法正确的是:", "options": [{"letter": "A", "text": "高度每上升1000ft，温度下降6.5℃"}, {"letter": "B", "text": "ISA标准温度为15℃"}, {"letter": "C", "text": "ISA偏差是指某处实际温度与标准温度的差值"}, {"letter": "D", "text": "不同地区在相同气压高度时的ISA标准温度并不相同"}], "answer": "C", "explanation": "1. ISA条件下的标准温度是指在某个位置在ISA条件时的温度，不同高度时的标准温度是不同的。 2. 由于气压高度是在ISA条件下根据气压值得到的高度，因此不同位置，只要气压高度相同，其ISA标准温度就是相同的。", "answers": []}, {"id": 127, "type": "choice", "label": "单选题", "number": 14, "chapter": "第一章改", "stem": "某飞机从保持6000ft修正海压气压高度(高度表的调定基准为QNH=1016hPa)进行飞行，对应的海拔高度为6300ft；当飞机到达外界大气温度大幅降低的区域时，飞机的气压高度表读数为（ ），对应的海拔高度为（ ）。", "options": [{"letter": "A", "text": "小于6000ft；小于6300ft"}, {"letter": "B", "text": "大于6000ft；大于6300ft"}, {"letter": "C", "text": "等于6000ft；小于6300ft"}, {"letter": "D", "text": "等于6000ft；大于6300ft"}], "answer": "C", "explanation": "（1）飞机保持气压高度表调定值1016hPa不变，并且保持6000ft气压高度飞行，则外界大气温度变化时，并不会影响气压高度表的读数。原因很简单，保持6000ft气压高度飞行，意味着保持等压线飞行，高度表读数并不会发生变化（忽略高度表误差影响）。 （2）外界环境气温降低，气压递减率（气压随高度升高的降低幅度）就会增大，即等压线下移，飞机在保持6000ft气压高度的等压线飞行，对应的海拔高度必然是降低的。 即，温度越低，飞的越低。", "answers": []}, {"id": 128, "type": "choice", "label": "单选题", "number": 1, "chapter": "第一章改", "stem": "低速流动中，在机翼前缘附近的驻点处，总压等于（ ）。", "options": [{"letter": "A", "text": "动压"}, {"letter": "B", "text": "静压"}, {"letter": "C", "text": "正压"}, {"letter": "D", "text": "负压"}], "answer": "B", "explanation": "机翼表面的驻点处，气流流速为0，即动压为0，此时的总压就等于静压（伯努利定理）。", "answers": []}, {"id": 129, "type": "choice", "label": "单选题", "number": 2, "chapter": "第一章改", "stem": "高速流动中，皮托管内薄膜所感受的滞止压力（ ）静压与动压之和。", "options": [{"letter": "A", "text": "大于"}, {"letter": "B", "text": "小于"}, {"letter": "C", "text": "等于"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "高速流动时，由于空气的可压缩性，气流受阻时被压缩时内能增加，会产生额外的压力，因此皮托管内薄膜处的滞止压力(也就是总压或全压)，是大于静压与动压之和的。", "answers": []}, {"id": 130, "type": "choice", "label": "单选题", "number": 3, "chapter": "第一章改", "stem": "一架小型螺旋桨飞机分别在不同高度上保持表速进行平飞时，不考虑重量的变化，则下列哪些参数相等？", "options": [{"letter": "A", "text": "真空速"}, {"letter": "B", "text": "迎角"}, {"letter": "C", "text": "总压"}, {"letter": "D", "text": "静压"}], "answer": "B", "explanation": "", "answers": []}, {"id": 131, "type": "choice", "label": "单选题", "number": 4, "chapter": "第一章改", "stem": "一架B737-800分别在不同高度上保持表速300kt进行平飞时，不考虑重量的变化，则下列哪些参数相等？", "options": [{"letter": "A", "text": "真空速"}, {"letter": "B", "text": "迎角"}, {"letter": "C", "text": "总压"}, {"letter": "D", "text": "总压－静压"}], "answer": "D", "explanation": "", "answers": []}, {"id": 132, "type": "choice", "label": "单选题", "number": 5, "chapter": "第一章改", "stem": "已知外界大气条件为ISA+10 ℃，飞机保持马赫数0.78不变，从FL290爬升到FL390的过程中，飞机的真空速TAS将如何变化？ (注：在国际标准大气ISA中，对流层顶的高度为36089 ft)", "options": [{"letter": "A", "text": "一直增加"}, {"letter": "B", "text": "一直减小"}, {"letter": "C", "text": "保持不变"}, {"letter": "D", "text": "先增加、后不变"}, {"letter": "E", "text": "先减小、后不变"}, {"letter": "F", "text": "不规律的复杂变化"}], "answer": "E", "explanation": "", "answers": []}, {"id": 133, "type": "choice", "label": "单选题", "number": 6, "chapter": "第一章改", "stem": "已知外界大气条件为ISA+10 ℃，飞机保持马赫数0.78不变，从FL290爬升到FL390的过程中，飞机的指示空速IAS将如何变化？ (注：在国际标准大气ISA中，对流层顶的高度为36089 ft)", "options": [{"letter": "A", "text": "一直增加"}, {"letter": "B", "text": "一直减小"}, {"letter": "C", "text": "保持不变"}, {"letter": "D", "text": "先增加、后不变"}, {"letter": "E", "text": "先减小、后不变"}, {"letter": "F", "text": "不规律的复杂变化"}], "answer": "B", "explanation": "", "answers": []}, {"id": 134, "type": "choice", "label": "单选题", "number": 7, "chapter": "第一章改", "stem": "当飞行员操纵飞机保持IAS=280kt从10,000ft爬升至25,000ft的过程中，EAS如何变化？", "options": [{"letter": "A", "text": "不断增大"}, {"letter": "B", "text": "不断减小"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "先减小后增大"}], "answer": "B", "explanation": "IAS=250kt，且高于标准海平面，速度较快，必须考虑空气可压缩性，EAS与CAS是不等的。 CAS > EAS，且随着飞行高度的增加，两者的差距也会越大，即EAS不断减小。", "answers": []}, {"id": 135, "type": "choice", "label": "单选题", "number": 8, "chapter": "第一章改", "stem": "当飞行员操纵飞机保持IAS=280kt从10,000ft爬升至25,000ft的过程中，TAS如何变化？", "options": [{"letter": "A", "text": "不断增大"}, {"letter": "B", "text": "不断减小"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "保持CAS不变进行爬升时，空气密度减小，气压降低，空气更加稀薄，飞机需要更大的真空速才能保持总压与静压之差不变(虽然随着高度的增加，静压降低，总压也需要降低，但是所需要的真空速还是增加的，否则无法保证两者之差不变)", "answers": []}, {"id": 136, "type": "choice", "label": "单选题", "number": 9, "chapter": "第一章改", "stem": "当飞行员操纵飞机保持IAS=280kt从10,000ft爬升至25,000ft的过程中，马赫数如何变化？", "options": [{"letter": "A", "text": "不断增加"}, {"letter": "B", "text": "不断减小"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "保持IAS爬升时，随着高度的升高，TAS是一直增大的，同时气温降低，音速减小，因此对应的马赫数必然是增加的。", "answers": []}, {"id": 137, "type": "choice", "label": "单选题", "number": 10, "chapter": "第一章改", "stem": "飞机保持校正空速CAS不变进行爬升时,", "options": [{"letter": "A", "text": "当量空速EAS增大"}, {"letter": "B", "text": "当量空速EAS不随高度变化而变化"}, {"letter": "C", "text": "当量空速EAS减小"}, {"letter": "D", "text": "当量空速EAS保持不变"}], "answer": "C", "explanation": "", "answers": []}, {"id": 138, "type": "choice", "label": "单选题", "number": 11, "chapter": "第一章改", "stem": "当重量和构型不变时，飞机总是在同一个速度时起飞离地，这个速度是：", "options": [{"letter": "A", "text": "真空速TAS"}, {"letter": "B", "text": "当量空速EAS"}, {"letter": "C", "text": "指示空速IAS"}, {"letter": "D", "text": "校正空速CAS"}], "answer": "B", "explanation": "", "answers": []}, {"id": 139, "type": "choice", "label": "单选题", "number": 12, "chapter": "第一章改", "stem": "飞机保持相同升力系数分别在3,000ft和5,000ft两个高度上进行平飞时，以下哪个参数保持不变？", "options": [{"letter": "A", "text": "TAS"}, {"letter": "B", "text": "IAS"}, {"letter": "C", "text": "CAS"}, {"letter": "D", "text": "EAS"}], "answer": "D", "explanation": "（1）不同高度上保持相同升力系数进行平飞时，由升力公式可知，动压一定是不变的，而EAS正是来自于动压，因此EAS一定是不变的。 （2）相同动压，高度不同，密度不同，TAS必然不同。 （3）高空时，不同高度上的空气可压缩程度不同，在保持相同迎角进行平飞时所对应的总压与静压之差其实是不同的，即对应的CAS不同。只不过，这个差别并不是很大。IAS是CAS在空速表上的读数，现代飞机的空速表误差已经非常小，二者几乎相等，因此，CAS不同，IAS也不同。", "answers": []}, {"id": 140, "type": "choice", "label": "单选题", "number": 13, "chapter": "第一章改", "stem": "飞机保持CAS=300kt分别在20,000ft和33,000ft两个高度上进行平飞时，以下哪个参数严格保持不变？", "options": [{"letter": "A", "text": "总压"}, {"letter": "B", "text": "静压"}, {"letter": "C", "text": "总压 － 静压"}, {"letter": "D", "text": "全压"}], "answer": "C", "explanation": "保持CAS不变，意味着总压与静压之差不变。在高空时，由于空气的可压缩性，总压与静压之差并不等于总压。 总压又称为滞止压力，或全压。", "answers": []}, {"id": 141, "type": "choice", "label": "单选题", "number": 14, "chapter": "第一章改", "stem": "当一架A321分别在FL200和FL300两个高度层上保持CAS=300kt进行巡航飞行时，忽略油耗的影响，则下列哪一参数严格相同？", "options": [{"letter": "A", "text": "动压"}, {"letter": "B", "text": "静压"}, {"letter": "C", "text": "总压－静压"}, {"letter": "D", "text": "总压"}, {"letter": "E", "text": "当量空速"}], "answer": "C", "explanation": "保持CAS不变则意味着皮托管内总压与静压管内静压之间的压差不变。考虑空气可压缩性时(M≥0.4)，它们的压差并不等于动压，而且是大于动压。 注意CAS与当量空速EAS的区别，EAS不变则意味着动压不变。 另：由于EAS与CAS差别较小( < 30 kt)，因此，通常在定性分析时，可以认为EAS ≈ CAS，即CAS近似代表了动压的大小。", "answers": []}, {"id": 142, "type": "choice", "label": "单选题", "number": 15, "chapter": "第一章改", "stem": "当飞机保持指定的CAS和飞行高度层，从暖空气区域飞入冷空气区域时：", "options": [{"letter": "A", "text": "马赫数减小"}, {"letter": "B", "text": "马赫数增大"}, {"letter": "C", "text": "TAS减小"}, {"letter": "D", "text": "TAS增大"}], "answer": "C", "explanation": "(1) 保持高度层不变，意味着气压高度不变，即，静压不变； (2) 保持CAS不变，意味着总压与静压之差不变； (3) 结合(1)与大气状态方程P = ρRT可知，飞机由暖空气区域进入到冷空气区域后的空气密度增大，又由于飞机保持CAS飞行，因此TAS减小； (4) 由(1)和(2)可知总压和静压都不变，再结合可压缩伯努利方程， 可知：飞行马赫数不变。", "answers": []}, {"id": 143, "type": "choice", "label": "单选题", "number": 16, "chapter": "第一章改", "stem": "当飞机保持指定的马赫数和飞行高度层进行飞行时，当外界温度上升时：", "options": [{"letter": "A", "text": "CAS和TAS都增大"}, {"letter": "B", "text": "CAS增大，TAS减小"}, {"letter": "C", "text": "CAS保持不变，TAS减小"}, {"letter": "D", "text": "CAS保持不变，TAS增大"}], "answer": "D", "explanation": "(1) 保持马赫数不变，即TAS与当地音速之比不变 (2) 外界气温(OAT)升高，当地音速增大，而马赫数不变，因此TAS增大 (3) 保持飞行高度层不变，即外界大气压(静压)不变 (4) 由于马赫数是总压与静压之比的函数，而马赫数和静压都不变，因此可知总压也是不变的；而CAS取决于总压与静压之差，因此CAS也是不变的。", "answers": []}, {"id": 144, "type": "choice", "label": "单选题", "number": 17, "chapter": "第一章改", "stem": "当飞机保持指定的马赫数和飞行高度层进行飞行时，当外界温度上升时：", "options": [{"letter": "A", "text": "CAS保持不变，TAS减小"}, {"letter": "B", "text": "CAS保持不变，TAS增大"}, {"letter": "C", "text": "CAS增大，TAS减小"}, {"letter": "D", "text": "CAS和TAS都增大"}], "answer": "B", "explanation": "", "answers": []}, {"id": 145, "type": "choice", "label": "单选题", "number": 1, "chapter": "第一章改", "stem": "小型训练飞机多用( )。", "options": [{"letter": "A", "text": "活塞式发动机"}, {"letter": "B", "text": "涡轮喷气发动机"}, {"letter": "C", "text": "涡轮风扇发动机"}, {"letter": "D", "text": "涡轮螺旋桨发动机"}], "answer": "A", "explanation": "", "answers": []}, {"id": 146, "type": "choice", "label": "单选题", "number": 2, "chapter": "第一章改", "stem": "对活塞式螺旋桨飞机，飞行速度越快，螺旋桨所产生的拉力（ ）。", "options": [{"letter": "A", "text": "越大"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "不变"}, {"letter": "D", "text": "无法确定"}], "answer": "B", "explanation": "螺旋桨飞机，飞行速度越快，桨叶迎角则越小，产生的拉力也越小", "answers": []}, {"id": 147, "type": "choice", "label": "单选题", "number": 3, "chapter": "第一章改", "stem": "现代大型民航客机多用( )。", "options": [{"letter": "A", "text": "活塞式发动机"}, {"letter": "B", "text": "涡轮喷气发动机"}, {"letter": "C", "text": "涡轮风扇发动机"}, {"letter": "D", "text": "涡轮螺旋桨发动机"}], "answer": "C", "explanation": "", "answers": []}, {"id": 148, "type": "choice", "label": "单选题", "number": 4, "chapter": "第一章改", "stem": "现代大型民航运输机一般都使用的是双转子双涵道涡轮风扇发动机，它有一个能够反映推力输出大小的重要参数，数值上等于低压涡轮后的总压与低压压气机进口处的总压之比，该参数叫（ ）。", "options": [{"letter": "A", "text": "N1"}, {"letter": "B", "text": "N2"}, {"letter": "C ons": [{"letter": "A", "text": "平飞最大速度VMAX"}, {"letter": "B", "text": "极限速度VNE"}, {"letter": "C", "text": "结构强度限制的最大巡航速度VNO"}, {"letter": "D", "text": "机动速度VA"}], "answer": "C", "explanation": "", "answers": []}, {"id": 167, "type": "choice", "label": "单选题", "number": 14, "chapter": "第一章改", "stem": "某A320飞机： 最大允许速度VMO = 350 kt, 起落架操作放出时的最大速度VLO(Ext) = 250 kt， 起落架放下位时的最大速度VLE = 280 kt, 进近形态CONF 2时的襟翼最大速度VFE = 200 kt, 则该飞机在进近阶段的最大飞行速度为（ ）。", "options": [{"letter": "A", "text": "350 kt"}, {"letter": "B", "text": "280 kt"}, {"letter": "C", "text": "250 kt"}, {"letter": "D", "text": "200 kt"}], "answer": "D", "explanation": "", "answers": []}, {"id": 168, "type": "choice", "label": "单选题", "number": 15, "chapter": "第一章改", "stem": "飞机做定常平飞时，最大平飞速度常受到飞机结构强度的限制（通常使用最大允许校正空速或指示空速进行限制，例如小型飞机的VNO和高亚音速运输机的VMO），在中低空飞行时，随着高度的增加，结构强度限制的最大允许真空速是：", "options": [{"letter": "A", "text": "增大的"}, {"letter": "B", "text": "减小的"}, {"letter": "C", "text": "不变的"}, {"letter": "D", "text": "先增大后减小"}], "answer": "A", "explanation": "1 指示空速IAS与校正空速CAS之间存在空速表误差（指示误差、压力误差），而这个误差通常较小，且在现代数字化航电系统中会自动进行修正，即，IAS≈CAS，两者几乎相等。 2 校正空速CAS与当量空速EAS之间存在可压缩性误差，这个误差随飞行马赫数的增加而增大，并且此误差在飞行运行速度范围内，最高不会超过30kt，与飞机的常用飞行速度大小相比，小很多。因此，在定性分析时，通常忽略这个可压缩性误差所带来的影响。（注意，并不表示该误差不存在，只是影响较小罢了） 3 VNO与VMO，它们的共同特点是受飞机结构强度限制的最大飞行速度，是由飞机制造厂商通过复飞试验验证得到的一个固定速度值，在飞行手册中，使用IAS或CAS表示。 4 相同IAS或相同CAS，定性分析时（见第2条），可以认为动压保持不变（近似认为当量空速不变），高度增加时，大气密度减小，因此，对应的真空速增大。", "answers": []}, {"id": 169, "type": "choice", "label": "单选题", "number": 16, "chapter": "第一章改", "stem": "已知某B737-800，飞行高度为FL360，重量为160,000LB，重心位置25%MAC，最大允许马赫数MMO为M0.82，从抖振开始边界图表（BOB Chart）中查得在载荷因数为1.3时的低速抖振马赫数为M0.73，高速抖振马赫数为M0.81，则该B737-800飞机在这种条件下可选的巡航马赫数范围为（ ）。", "options": [{"letter": "A", "text": "M0.4 ~ M0.82"}, {"letter": "B", "text": "M0.73 ~ M0.81"}, {"letter": "C", "text": "M0.73 ~ M0.82"}, {"letter": "D", "text": "M0.4 ~ M0.73"}], "answer": "B", "explanation": "", "answers": []}, {"id": 170, "type": "choice", "label": "单选题", "number": 1, "chapter": "第三章", "stem": "一般情况下,机翼升力 于"}], "answer": "C", "explanation": "一般情况下, 临界马赫数小于阻力发散马赫数。", "answers": []}, {"id": 188, "type": "choice", "label": "单选题", "number": 19, "chapter": "第三章", "stem": "小型螺旋桨飞机常以（ ）为界把平飞速度范围分为两个速度范围。", "options": [{"letter": "A", "text": "失速速度VS"}, {"letter": "B", "text": "最小功率速度VMP"}, {"letter": "C", "text": "最小阻力速度VMD"}, {"letter": "D", "text": "最小操纵速度VMC"}], "answer": "B", "explanation": "", "answers": []}, {"id": 189, "type": "choice", "label": "单选题", "number": 20, "chapter": "第三章", "stem": "大型民用喷气式飞机常以（ ）为界把平飞速度范围分为两个速度范围。", "options": [{"letter": "A", "text": "失速速度VS1g"}, {"letter": "B", "text": "最小功率速度VMP"}, {"letter": "C", "text": "最小阻力速度VMD"}, {"letter": "D", "text": "远航速度VMRC"}], "answer": "C", "explanation": "", "answers": []}, {"id": 190, "type": "choice", "label": "单选题", "number": 21, "chapter": "第三章", "stem": "关于平飞速度范围与速度稳定性，以下说法正确的是：", "options": [{"letter": "A", "text": "在第一速度范围内，飞机具有速度稳定性"}, {"letter": "B", "text": "在第二速度范围内，飞机具有速度稳定性"}, {"letter": "C", "text": "无论在第一速度范围还是第二速度范围，飞机都具有速度稳定性"}, {"letter": "D", "text": "飞机在最后进近阶段、放下襟翼后，由于失速速速减小，将容易失去速度稳定性"}], "answer": "A", "explanation": "当油门位置不变时，在第一速度范围内，当飞机受到扰动使得空速增加时，总阻力增大，又使得空速减小，回到原来的空速。这种特性称为速度稳定性，即飞机在第一速度范围内是拥有速度稳定性的。 打开大角度襟翼和起落架除了能够有效降低失速速度以外，还能够大幅增大废阻力，使得VMP和VMD均减小，这样飞机较为不容易进入第二速度范围。", "answers": []}, {"id": 191, "type": "choice", "label": "单选题", "number": 1, "chapter": "第三章", "stem": "上升角是：", "options": [{"letter": "A", "text": "飞机上升轨迹与水平面之间的夹角"}, {"letter": "B", "text": "飞机轨迹与相对气流之间的夹角"}, {"letter": "C", "text": "上升时飞机的仰角减去平飞时飞机的仰角"}, {"letter": "D", "text": "飞机的仰角"}], "answer": "A", "explanation": "", "answers": []}, {"id": 192, "type": "choice", "label": "单选题", "number": 2, "chapter": "第三章", "stem": "飞机进行定常上升时的升力（ ）平飞时的升力。", "options": [{"letter": "A", "text": "大于"}, {"letter": "B", "text": "小于"}, {"letter": "C", "text": "等于"}, {"letter": "D", "text": "可能大于，也可能小于"}], "answer": "B", "explanation": "", "answers": []}, {"id": 193, "type": "choice", "label": "单选题", "number": 3, "chapter": "第三章" 减小，增大"}, {"letter": "D", "text": "减小，减小"}], "answer": "C", "explanation": "重量增加时，总阻力曲线会向右上移动，使得最小阻力速度VMD增大，主要是由于诱导阻力(Induced Drag)的增加而造成的。 以相同速度上升时，重量增加，剩余推力减小，上升角和上升梯度减小。", "answers": []}, {"id": 200, "type": "choice", "label": "单选题", "number": 10, "chapter": "第三章", "stem": "当重量增加时，喷气式飞机的最大上升率（ ），快升速度VY（ ）。", "options": [{"letter": "A", "text": "增大，增大"}, {"letter": "B", "text": "增大，减小"}, {"letter": "C", "text": "减小，增大"}, {"letter": "D", "text": "减小，减小"}], "answer": "C", "explanation": "重量增加时，所需功率曲线会向右上移动，最大剩余功率减小，最大上升率减小，且对应的速度即VY增大，主要是由于诱导阻力(Induced Drag)的增加而造成的。 以相同速度上升时，重量增加，剩余功率减小，上升率减小。", "answers": []}, {"id": 201, "type": "choice", "label": "单选题", "number": 11, "chapter": "第三章", "stem": "打开大角度襟翼后，喷气式飞机的爬升梯度（ ），陡升速度VX（ ）。", "options": [{"letter": "A", "text": "增大，增大"}, {"letter": "B", "text": "增大，减小"}, {"letter": "C", "text": "减小，增大"}, {"letter": "D", "text": "减小，减小"}], "answer": "D", "explanation": "如果飞机打开襟翼或放下起落架，即非光洁构型(Dirty)，总阻力曲线会向左上方移动，使得最小阻力速度VMD减小，这是由于废阻力(Parasite Drag)的增加引起的。 因此，以相同速度上升时，使用非光洁构型，剩余推力减小，上升角和上升梯度减小。", "answers": []}, {"id": 202, "type": "choice", "label": "单选题", "number": 12, "chapter": "第三章", "stem": "打开大角度襟翼后，喷气式飞机的最大上升率（ ），快升速度VY（ ）。", "options": [{"letter": "A", "text": "增大，增大"}, {"letter": "B", "text": "增大，减小"}, {"letter": "C", "text": "减小，增大"}, {"letter": "D", "text": "减小，减小"}], "answer": "D", "explanation": "如果飞机打开襟翼或放下起落架，即非光洁构型(Dirty)，所需功率曲线会向左上方移动，最大剩余功率减小，最大上升率减小，且所对应的速度即VY减小，这是由于废阻力(Parasite Drag)的增加引起的。 因此，以相同速度上升时，使用非光洁构型，剩余功率减小，上升率减小。", "answers": []}, {"id": 203, "type": "choice", "label": "单选题", "number": 13, "chapter": "第三章", "stem": "随着高度的升高，喷气式飞机的陡升速度VX(IAS)将（ ），快升速度VY(IAS)将（ ）。", "options": [{"letter": "A", "text": "增大，增大"}, {"letter": "B", "text": "增大，减小"}, {"letter": "C", "text": "减小，增大"}, {"letter": "D", "text": "减小，减小"}, {"letter": "E", "text": "不变，减小"}], "answer": "E", "explanation": "", "answers": []}, {"id": 204, "type": "choice", "label": "单选题", "number": 14, "chapter": "第三章", "stem": "随着高度的增加，最大上升角和最大上升率如何变化？", "options": [{"letter": "A", "text": "都减小"}, {"letter": "B", "text": "都增加"}, {"letter": "C", "text": "最大上升角增加，最大上升率减小"}, {"letter": "D", "text": "最大上升角减小，最大上升率增加"}], "answer": "A", "explanation": "", "answers": []}, {"id": 205, "type": "choice", "label": "单选题", "number": 15, "chapter": "第三章", "stem": "在理论升限，最佳爬升角速度（Vx） 最佳爬升率速度（Vy）。", "options": [{"letter": "A", "text": "大于"}, {"letter": "B", "text": "小于"}, {"letter": "C", "text": "等于"}, {"letter": "D", "text": "无关于"}], "answer": "C", "explanation": "", "answers": []}, {"id": 206, "type": "choice", "label": "单选题", "number": 16, "chapter": "第三章", "stem": "水平气流对飞机上升率的影响是：", "options": [{"letter": "A", "text": "使上升率增大"}, {"letter": "B", "text": "使上升率减小"}, {"letter": "C", "text": "不一定，视顺风和逆风而定"}, {"letter": "D", "text": "没有影响"}], "answer": "D", "explanation": "", "answers": []}, {"id": 207, "type": "fill", "label": "填空题", "number": 17, "chapter": "第三章", "stem": "某飞机在无风情况下以TAS等于180kt进行上升时的上升梯度为12%，在其他条件不变的情况下，则该飞机在20kt顺风中以相同真空速进行上升时的上升梯度(%)等于 %。", "options": [], "answer": "10.8", "explanation": "水平风时的上升梯度*地速 = 无风时的上升梯度*真空速 水平风时的上升梯度 = 无风时的上升梯度*真空速/地速 = 12% * 180 / (180+20)=10.8% 注：水平风中的梯度推导过程，请详见课件。此题公式不需要记忆，简单推导即可得出。", "answers": ["10.8"]}, {"id": 208, "type": "fill", "label": "填空题", "number": 18, "chapter": "第三章", "stem": "某双发喷气式飞机起飞后按照正常程序进行离场，当上升至气压高度8000 ft时，真空速为250 kt，逆风50 kt，飞机总重量为60,000 kg，全发工作，每台发动机产生的推力为60,000 N，升阻比为10，重力加速度取10 m/s2, 试估算出此时飞机相对地面的上升梯度 = ( ) % (百分之，并精确到一位小数)", "options": [], "answer": "12.5", "explanation": "（1）求解无风时的上升梯度： 推力T = 60,000×2 = 120,000N； 重力W = 60,000×10 = 600,000N; 升阻比K = 10； 设升力为L，阻力为D，上升角为γ，在上升的某一时刻看作为匀速上升，则匀速直线上升运动方程： L = W cosγ D = T–W sinγ 由于上升角很小，cosγ≈1，sinγ≈tgγ，所以： 上升梯度tgγ = (T–D)/W = T/W–D/W，而L≈W， 因此，tgγ = T/W–D/L = T/W–1/K= 120,000/600,000–1/10 = 0.2 – 0.1 = 0.1 = 10% （2）对上升梯度进行风修正： 真空速TAS等于250kt，逆风50 kt时，则地速GS约等于250 – 50 = 200 kt。 对于民用机，有水平风时的上升梯度 = (TAS / GS) × 无风时的上升梯度 因此，逆风50 kt时的上升梯度 = 250 / 200 × 10% = 12.5%", "answers": ["12.5"]}, {"id": 209, "type": "fill", "label": "填空题", "number": 19, "chapter": "第三章", "stem": "某双发飞机，重量为50,000kg，全发工作，每台发动机产生的推力75,000N，升阻比为10，重力加速度g取10m/s2，则爬升梯度(%)为： %。", "options": [], "answer": "20", "explanation": "知识点： 风对爬升性能的影响", "answers": ["20"]}, {"id": 210, "type": "fill", "label": "填空题", "number": 20, "chapter": "第三章", "stem": "已知某飞机航线爬升阶段，由 1500 ft 爬升到 10,000 ft 时，其相对于静止大气的爬升梯度(即相对于空气的爬升梯度)为10%，平均真空速为180 kt，爬升期间平均逆风 -20 kt，试估算该飞机在爬升过程中： 空中水平距离 = ( ) nm；（精确到一位小数） 地面水平距离 = ( ) nm。（精确到一位小数） 注： 1000 ft = 0.3048 km 1000 ft = 0.1645788 nm", "options": [], "answer": "14.0、12.0-13.0", "explanation": "爬升期间的高度增量为 ΔH=10000ft-1500ft=8500ft， 飞机相对大气飞过的空中水平距离 NAM 为 NAM =ΔH/γA=8500÷ 0.1=85000ft=25.9km=14.0 nm； 由 1500ft 爬升到 10000ft 的时间 tA= NAM /VTAS=14.0÷ 180=0.08(h)=4.8min。 飞机在爬升期间随大气移动的距离记为 NWM = -20kn × 0.08h=1.6nm。 因此飞机爬升期间飞过的地面水平距离 NGM 为 NGM = NAM + NWM = 14.0 - 1.6 = 12.4 nm", "answers": ["14.0", "12.0-13.0"]}, {"id": 211, "type": "fill", "label": "填空题", "number": 21, "chapter": "第三章", "stem": "某双发飞机，重量为5,000kg，全发工作进行爬升，每台发动机产生的推力4,500N，爬升过程中平均真空速为150kt，升阻比为10，有逆风30kt，重力加速度g取10m/s2，则： (1) 该飞机相对于地面的爬升梯度(%)等于 %。 (2) 若飞机当前海拔高度为700m，前方5km处有标高为1300m的高大障碍物，飞机是否可以安全越障？ (填：是或者否)", "options": [], "answer": "无风时的爬升梯度、爬升越障的最小梯度要求", "explanation": "(1)无风时的爬升梯度 = (T-D)/W = T/W – D/L = T/W – 1/K = 24500 / (5000*10) – 1/10 = 0.08 = 8% 逆风20kt时的爬升梯度 = 真空速/地速*无风爬升梯度 = 150 / (150-30)*8% = 10% (2)爬升越障的最小梯度要求 = (障碍物标高 -飞机海拔高度)/障碍物水平距离 = (1300-700)/5000=12% 由此可知，飞机的爬升梯度10%小于最小爬升梯度要求12%，意味着不能安全越障。 注：水平风中的梯度推导过程，请详见课件。此题公式不需要记忆，简单推导即可得出。", "answers": ["无风时的爬升梯度", "爬升越障的最小梯度要求"]}, {"id": 212, "type": "choice", "label": "单选题", "number": 1, "chapter": "第三章", "stem": "爬升中为了获得较大的上升率，通常低空保持等（ ），高空保持等（ ）。", "options": [{"letter": "A", "text": "真空速，表速"}, {"letter": "B", "text": "表速，马赫数"}, {"letter": "C", "text": "真空速，马赫数"}, {"letter": "D", "text": "表速，表速"}], "answer": "B", "explanation": "", "answers": []}, {"id": 213, "type": "choice", "label": "单选题", "number": 2, "chapter": "第三章", "stem": "由10,000ft等表速爬升到转换高度，期间以恒定的指示空速IAS=300kt爬升，则该阶段飞机的真实空速随爬升高度增加而（ ）。", "options": [{"letter": "A", "text": "保持恒定"}, {"letter": "B", "text": "不断增加"}, {"letter": "C", "text": "不断减小"}, {"letter": "D", "text": "需要根据爬升高度确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 214, "type": "choice", "label": "单选题", "number": 3, "chapter": "第三章", "stem": "由10,000ft等表速爬升到转换高度，期间以恒定的指示空速IAS=300kt爬升，则该阶段飞机的当量空速随爬升高度增加而", "options": [{"letter": "A", "text": "保持恒定"}, {"letter": "B", "text": "不断增加"}, {"letter": "C", "text": "不断减小"}, {"letter": "D", "text": "需要根据爬升高度确定"}], "answer": "C", "explanation": "高于标准海平面且飞行速度较大时(M>0.3)，由于空气可压缩性影响，使得CAS >EAS，且高度越高，两者相差越大。当保持IAS(即CAS)进行爬升时，则EAS是越来越小的。 TAS、EAS、CAS和IAS的区别请详见章节“1.3 飞行速度”。", "answers": []}, {"id": 215, "type": "choice", "label": "单选题", "number": 4, "chapter": "第三章", "stem": "在转换高度以上，飞机以恒定的马赫数M=0.78进行爬升，则该阶段飞机的真实空速随爬升高度增加而", "options": [{"letter": "A", "text": "保持恒定"}, {"letter": "B", "text": "不断增加"}, {"letter": "C", "text": "不断减小"}, {"letter": "D", "text": "需要根据爬升高度确定"}], "answer": "D", "explanation": "在对流层顶以下，保持马赫数进行爬升时，温度降低，音速减小，因此TAS减小； 在对流层顶以上，即平流层，温度不变，音速不变，则保持马赫数进行爬升时，TAS不变。", "answers": []}, {"id": 216, "type": "choice", "label": "单选题", "number": 5, "chapter": "第三章", "stem": "飞机保持表速在航线爬升阶段，随着高度的增加，下列说法正确的是：", "options": [{"letter": "A", "text": "最大爬升率是增加的，对应的真空速是增加的。"}, {"letter": "B", "text": "最大爬升率是减小的，对应的真空速是增加的。"}, {"letter": "C", "text": "最大爬升率是增加的，对应的真空速是减小的。"}, {"letter": "D", "text": "最大爬升率是减小的，对应的真空速是减小的。"}], "answer": "B", "explanation": "", "answers": []}, {"id": 217, "type": "choice", "label": "多选题", "number": 6, "chapter": "第三章", "stem": "已知某民航客机的爬升速度剖面为320kt/M0.71，若转换高度为27130ft，则下述正确的是：", "options": [{"letter": "A", "text": "在转换高度以下保持IAS等于320kt爬升"}, {"letter": "B", "text": "在转换高度以上保持MACH等于0.71爬升"}, {"letter": "C", "text": "转换高度为IAS 320kt对应的马赫数刚好等于0.71时的气压高度"}, {"letter": "D", "text": "飞机从10000ft开始爬升至33000ft的过程中，随着高度增加，大气密度的降低，真空速会逐渐增大"}], "answer": "BC", "explanation": "爬升速度剖面为320kt/M0.71，意味着：在10000ft以下，必须保持IAS=250kt以下进行爬升（法规规定，因此有些机型操作手册中在320kt/M0.71的前面并不会写明250kt）；在10000ft到转换高度之间（一般在10000ft高度上进行平飞加速至IAS 320kt，实际中也有些飞行员会使用边爬升、边加速至IAS 320kt），保持IAS=320kt爬升；高于转换高度时，保持马赫数0.71进行爬升，此时随着高度的增加，音速是降低的，因此保持马赫数不变，就意味着真空速也是降低的。（注意，之前保持IAS爬升时，因为表速不变，即动压不变，随着高度增加，密度降低，因此真空速是增加的）", "answers": []}, {"id": 218, "type": "choice", "label": "多选题", "number": 7, "chapter": "第三章", "stem": "假设A320飞机的标准爬升剖面为：250kt/300kt/M0.78，则下述正确的有：", "options": [{"letter": "A", "text": "低空爬升时的真空速等于250kt，高空爬升时的真空速等于300kt，临界马赫数等于0.78"}, {"letter": "B", "text": "10,000ft气压高度以下保持表速250kt爬升，10,000ft气压高度以上保持表速300kt爬升，但马赫数不能超过M0.78"}, {"letter": "C", "text": "10,000ft气压高度以上保持马赫数M0.78爬升，10,000ft气压高度以上保持表速300kt爬升，最后到达航路高度后保持表速250kt飞行"}, {"letter": "D", "text": "以上都不对"}], "answer": "D", "explanation": "", "answers": []}, {"id": 219, "type": "fill", "label": "填空题", "number": 1, "chapter": "第三章", "stem": "参见图[S-3-1]，已知B737-800W：标准大气条件ISA，无风，起飞重量70000kg，爬升顶点(TOC)高度33000ft，机场海拔高度6000ft。则: 爬升时间= min， 爬升经过的水平距离= nm， 平均真空速= kt， 消耗的燃油= kg。", "options": [], "answer": "17、98、382、1400", "explanation": "注意，机场标高6000ft，爬升耗油需要-200kg。", "answers": ["17", "98", "382", "1400"]}, {"id": 220, "type": "fill", "label": "填空题", "number": 2, "chapter": "第三章", "stem": "参见图[S-3-1]，已知B737-800W：标准大气条件ISA，顺风30kt，起飞重量78000kg，爬升顶点(TOC)高度33000ft，机场海拔高度6000ft。则: 爬升时间= min， 爬升经过的水平距离= nm， 消耗的燃油= kg。", "options": [], "answer": "21、127.5、1650", "explanation": "根据条件查表，无风时爬升到33000ft所需时间为21min，所需燃油1850kg，水平距离117nm。 修正： 顺风30kt，则地面距离 = 117 + 30 * 21/60 = 127.5nm 机场标高6000ft，需修正燃油，所需燃油 = 1850 - 200 = 1650kg。", "answers": ["21", "127.5", "1650"]}, {"id": 221, "type": "fill", "label": "填空题", "number": 3, "chapter": "第三章", "stem": "参见图[S-3-2]，已知空客A320飞机，其松刹车时飞机重量是70吨，温度为ISA ，重心位置：33%，空调正常，爬升速度250kt/300kt/M0.78，全防冰系统: 开，爬升顶点为31000ft。则： 需要的时间= min； 水平距离= nm； 消耗燃油= kg； 平均真实空速= kt。", "options": [], "answer": "19、115、1727.16、363", "explanation": "根据条件，松刹车重量70吨，爬升顶点FL310，查表得到正常情况下的爬升时间19min，油耗1556kg，水平距离115nm，平均真空速363kt。由于总防冰开关为开状态，因此油耗需要+11%，因此修正后的油耗=1556*(1+11%)=1727.16kg。", "answers": ["19", "115", "1727.16", "363"]}, {"id": 222, "type": "fill", "label": "填空题", "number": 4, "chapter": "第三章", "stem": "参见图[S-3-2]，已知空客A320飞机，其松刹车时飞机重量是76吨，温度为ISA ，重心位置：33%，空调正常，爬升速度250kt/300kt/M0.78，全防冰系统: 开，机场压力高度5000ft，爬升顶点为31000ft，顺风60kt。则： 需要的时间= min； 水平距离= nm； 消耗燃油= kg（精确到两位小数）；", "options": [], "answer": "19、144、1582.86", "explanation": "根据条件查表， 从标准海平面爬升到31000ft，所需要的时间为22min，水平距离为135nm，燃油1788kg； 从标准海平面爬升到5000ft，所需要的时间为3min，水平距离为10nm，燃油362kg； 则， 从压力高度为5000ft的机场爬升到31000ft，所需要的时间为22-3=19min，水平距离为135-10=125nm，燃油1788-362=1426kg。 修正： 地面距离 = 125 + 60 * 19/60 = 144nm; 所需燃油 = 1426 * (1+11%) =1582.86kg。", "answers": ["19", "144", "1582.86"]}, {"id": 223, "type": "choice", "label": "单选题", "number": 1, "chapter": "第三章", "stem": "飞机在稳定下降过程中,升力和重力的关系是：", "options": [{"letter": "A", "text": "升力大于重力"}, {"letter": "B", "text": "升力等于重力"}, {"letter": "C", "text": "升力小于重力"}], "answer": "C", "explanation": "飞机在稳定下降过程中,升力与重力的第二分力相平衡。", "answers": []}, {"id": 224, "type": "choice", "label": "单选题", "number": 2, "chapter": "第三章", "stem": "飞机的下滑角是( )。", "options": [{"letter": "A", "text": "升力与阻力的夹角"}, {"letter": "B", "text": "飞行轨迹与水平面的夹角"}, {"letter": "C", "text": "阻力与重力的夹角"}], "answer": "B", "explanation": "", "answers": []}, {"id": 225, "type": "choice", "label": "单选题", "number": 3, "chapter": "第三章", "stem": "当飞机保持升阻比不变、做无动力定常下滑时，重量越重，则滑翔梯度：", "options": [{"letter": "A", "text": "保持不变"}, {"letter": "B", "text": "增大"}, {"letter": "C", "text": "减小"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "飞机在无动力定常滑翔时，下降梯度只跟升阻比有关（注意与重量无关），而且与升阻比成反比。即，升阻比越大，下降梯度越小。", "answers": []}, {"id": 226, "type": "choice", "label": "单选题", "number": 4, "chapter": "第三章", "stem": "飞机保持固定油门设置进行等速直线下降(定常下降)，下降速度越快(第一速度范围)，则下降梯度( )，下降率( )。", "options": [{"letter": "A", "text": "越大，越大"}, {"letter": "B", "text": "越大，越小"}, {"letter": "C", "text": "越小，越大"}, {"letter": "D", "text": "不变，越小"}], "answer": "A", "explanation": "", "answers": []}, {"id": 227, "type": "choice", "label": "单选题", "number": 5, "chapter": "第三章", "stem": "当飞机带动力下降时（第一速度范围），重量越重，则相同速度的下降梯度：", "options": [{"letter": "A", "text": "保持不变"}, {"letter": "B", "text": "增大"}, {"letter": "C", "text": "减小"}, {"letter": "D", "text": "不能确定"}], "answer": "C", "explanation": "飞机有动力下降时，如果下降速度大于VMD(高速下降)，此时寄生阻力在总阻力中占比较大，重量增加，相同速度时的寄生阻力变化并不大，虽然总阻力会有所增加，但增加幅度低于重量的增加，最终使得下降角和下降梯度减小。", "answers": []}, {"id": 228, "type": "choice", "label": "单选题", "number": 6, "chapter": "第三章", "stem": "当飞机无动力下降时，重量越重，则飞机的最小下降梯度:", "options": [{"letter": "A", "text": "保持不变"}, {"letter": "B", "text": "越大"}, {"letter": "C", "text": "越小"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "飞机无动力下降时，最小下降梯度只取决于最大升阻比，而最大升阻比只取决于飞机构型（忽略空气压缩性影响）。因此，无动力下降时的下降梯度与重量无关。 注意，重量越重，最小下降梯度（最大升阻比）无动力下滑时的速度越大，即VMD越大（有利迎角不变，升力系数不变，但所需升力增大，因此对应的速度增大）", "answers": []}, {"id": 229, "type": "choice", "label": "单选题", "number": 7, "chapter": "第三章", "stem": "下降中,如果油门收回在慢车,在第一速度范围内,下降速度越大,飞机的下降角( ),下降率( )。", "options": [{"letter": "A", "text": "越大、越大"}, {"letter": "B", "text": "越大、越小"}, {"letter": "C", "text": "越小、越大"}], "answer": "A", "explanation": "", "answers": []}, {"id": 230, "type": "choice", "label": "单选题", "number": 8, "chapter": "第三章", "stem": "保持有利速度进行无动力下滑，飞机可以获得( )。", "options": [{"letter": "A", "text": "最小下滑阻力"}, {"letter": "B", "text": "最大下滑角"}, {"letter": "C", "text": "最大下滑升力"}], "answer": "A", "explanation": "", "answers": []}, {"id": 231, "type": "choice", "label": "单选题", "number": 9, "chapter": "第三章", "stem": "当飞机襟翼角度增加时，则相同速度的下降梯度：", "options": [{"letter": "A", "text": "保持不变"}, {"letter": "B", "text": "增大"}, {"letter": "C", "text": "减小"}, {"letter": "D", "text": "不能确定"}], "answer": "B", "explanation": "", "answers": []}, {"id": 232, "type": "choice", "label": "单选题", "number": 10, "chapter": "第三章", "stem": "保持相同表速下降,出现了侧滑后,飞机的下降率( )。", "options": [{"letter": "A", "text": "增大"}, {"letter": "B", "text": "减小"}, {"letter": "C", "text": "不变"}], "answer": "A", "explanation": "", "answers": []}, {"id": 233, "type": "choice", "label": "单选题", "number": 11, "chapter": "第三章", "stem": "水平逆风对飞机相对地面的下降梯度的影响是：", "options": [{"letter": "A", "text": "增加"}, {"letter": "B", "text": "减小"}, {"letter": "C", "text": "不影响"}, {"letter": "D", "text": "不确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 234, "type": "choice", "label": "单选题", "number": 12, "chapter": "第三章", "stem": "波音B747飞机在航线下降阶段中有60节的逆风，则其下降率与无风时相比：", "options": [{"letter": "A", "text": "将减小"}, {"letter": "B", "text": "将增大"}, {"letter": "C", "text": "保持不变"}, {"letter": "D", "text": "不一定"}], "answer": "C", "explanation": "", "answers": []}, {"id": 235, "type": "choice", "label": "单选题", "number": 13, "chapter": "第三章", "stem": "波音B777飞机在航线下降阶段中有40节的逆风，则：", "options": [{"letter": "A", "text": "下降率保持不变，相对于地面的下降梯度γG增加（即大于相对于空气爬升梯度γA）"}, {"letter": "B", "text": "下降率保持不变，相对于地面的下降梯度γG减小（即小于相对于空气爬升梯度γA）"}, {"letter": "C", "text": "下降率保持增加，相对于地面的下降梯度γG不变（即等于相对于空气爬升梯度γA）"}, {"letter": "D", "text": "下降率保持减小，相对于地面的下降梯度γG不变（即等于相对于空气爬升梯度γA）"}], "answer": "A", "explanation": "", "answers": []}, {"id": 236, "type": "fill", "label": "填空题", "number": 14, "chapter": "第三章", "stem": "静风中某飞机真空速为250kt时，其设计升阻比为15，在风速为50kt的顺风条件下，则这架飞机以相同真空速进行无动力下滑时的滑翔比为： 。", "options": [], "answer": "18", "explanation": "无风时，无动力下滑时的滑翔比等于升阻比，即15。 顺风时无动力下滑的滑翔比 = ( 无风时滑翔比 / 真空速 )*地速 = (15/250)*(250+50)=18 注：具体推导过程，请详见课件。此题公式不需要记忆，简单推导即可得出。", "answers": ["18"]}, {"id": 237, "type": "fill", "label": "填空题", "number": 15, "chapter": "第三章", "stem": "某双发飞机，重量为5,000kg，全发工作进行慢车下降，每台发动机产生的推力500N，下降过程中平均真空速为150kt，升阻比为10，有逆风30kt，重力加速度g取10m/s2，则： (1) 该飞机相对于地面的下降梯度(%)等于 %； (2) 若飞机当前海拔高度为1500m，前方5km处有标高为900m的高大障碍物，飞机是否可以安全越障？ (填：是或者否)", "options": [], "answer": "相对于空气、下降越障的最大梯度要求", "explanation": "(1) 相对于空气(无风)的下降梯度 = (D-T)/W = D/L – T/W = 1/K - T/W = 1/10 - 2500 / (5000*10) = 0.08 = 8% 逆风30kt时的下降梯度 = 真空速/地速 *无风爬升梯度 = 150 / (150-30) * 8% = 10% (2) 下降越障的最大梯度要求 = (飞机海拔高度-障碍物标高)/障碍物水平距离 = (1500-900)/5000=12% 由此可知，飞机的下降梯度10%小于最大下降梯度要求12%，意味着能够安全越障。 注：水平风中的梯度推导过程，请详见课件。此题公式不需要记忆，简单推导即可得出。", "answers": ["相对于空气", "下降越障的最大梯度要求"]}, {"id": 238, "type": "choice", "label": "单选题", "number": 1, "chapter": "第三章", "stem": "A320飞机由转换高度29314ft下降到10,000ft，期间以恒定的指示空速IAS=300kt下降，则该阶段飞机的真实空速随高度下降（ ）。", "options": [{"letter": "A", "text": "保持恒定"}, {"letter": "B", "text": "不断增加"}, {"letter": "C", "text": "不断减小"}, {"letter": "D", "text": "需要根据下降高度而定"}], "answer": "C", "explanation": "", "answers": []}, {"id": 239, "type": "choice", "label": "单选题", "number": 2, "chapter": "第三章", "stem": "飞机保持固定油门设置进行等速直线下降(定常下降)，下降速度越快(第一速度范围)，则下降梯度( )，下降率( )。", "options": [{"letter": "A", "text": "越大，越大"}, {"letter": "B", "text": "越大，越小"}, {"letter": "C", "text": "越小，越大"}, {"letter": "D", "text": "不变，越小"}], "answer": "A", "explanation": "", "answers": []}, {"id": 240, "type": "choice", "label": "单选题", "number": 3, "chapter": "第三章", "stem": "下降中,如果油门收回在慢车,在第一速度范围内,下降速度越大,飞机的下降角( ),下降率( )。", "options": [{"letter": "A", "text": "越大、越大"}, {"letter": "B", "text": "越大、越小"}, {"letter": "C", "text": "越小、越大"}], "answer": "A", "explanation": "", "answers": []}, {"id": 241, "type": "fill", "label": "填空题", "number": 1, "chapter": "第三章", "stem": "参见图[S-3-3]，已知A320下降时起始下降点(T/D)的重量为45000kg，温度为ISA+10，顺风30kt，空调正常，防冰关闭，重心位于33%MAC，下降速度选择为M0.78/300KT/250KT。则从FL370下降到FL100：（结果精确到小数点后两位） 所需要的下降时间= min， 下降地面距离= nm， 下降燃油消耗= kg。", "options": [], "answer": "9.80、76.98、114.48", "explanation": "根据飞机重量45000kg查表得到在无风、标准条件下， 从FL370下降到海平面的时间为14.6min，油耗152kg，水平距离90nm； 从FL100下降到海平面的时间为4.8min，油耗44kg，水平距离22nm； 则，从FL370下降到FL100的时间为9.8min，油耗108kg，水平距离68nm。 空调正常，防冰关闭，ISA+10，因此油耗和水平距离都会增加10*0.6%=6.0%。所以油耗=108*1.06=114.48kg，水平距离=68*1.06=72.08nm。 顺风30kt，还需要对水平距离进行修正：72.08 + 30 * 9.8/60 = 76.98nm。 所以，最终结果：下降时间9.8min，下降油耗114.48kg，地面距离76.98nm。", "answers": ["9.80", "76.98", "114.48"]}, {"id": 242, "type": "fill", "label": "填空题", "number": 2, "chapter": "第三章", "stem": "参见图[S-3-4]，已知B757-200飞机按M0.78/290KT/250KT方式，着陆重量为170KLB，机场气压高度为1500ft，求：从FL390开始下降所经历的总时间= min，消耗的总燃油= lb，飞过的水平距离= nm。", "options": [], "answer": "17、405、105", "explanation": "飞机从FL390下降到1500ft所需要的时间=22-5=17min，燃油=775-370=405lb，水平距离=111-6=105nm。", "answers": ["17", "405", "105"]}, {"id": 243, "type": "choice", "label": "多选题", "number": 1, "chapter": "第三章", "stem": "关于客舱压力高度，下述正确的是：", "options": [{"letter": "A", "text": "客舱压力高度属于气压高度"}, {"letter": "B", "text": "飞机的最大飞行高度不允许超过最大客舱压力高度"}, {"letter": "C", "text": "对客舱压力高度进行限制的原因之一，是为了保证给乘客提供舒适的飞行环境"}, {"letter": "D", "text": "通常客舱压力高度会随着爬升高度的变化而变化，最后在爬升定点达到计划的客舱高度"}], "answer": "ACD", "explanation": "", "answers": []}, {"id": 244, "type": "choice", "label": "单选题", "number": 2, "chapter": "第三章", "stem": "当飞机带动力下降时（第一速度范围），重量越重，则相同速度的下降梯度：", "options": [{"letter": "A", "text": "保持不变"}, {"letter": "B", "text": "增大"}, {"letter": "C", "text": "减小"}, {"letter": "D", "text": "不能确定"}], "answer": "C", "explanation": "飞机有动力下降时，如果下降速度大于VMD(高速下降)，此时寄生阻力在总阻力中占比较大，重量增加，相同速度时的寄生阻力变化并不大，虽然总阻力会有所增加，但增加幅度低于重量的增加，最终使得下降角和下降梯度减小。", "answers": []}, {"id": 245, "type": "choice", "label": "单选题", "number": 3, "chapter": "第三章", "stem": "飞机保持固定油门设置进行等速直线下降(定常下降)，下降速度越快(第一速度范围)，则下降梯度( )，下降率( )。", "options": [{"letter": "A", "text": "越大，越大"}, {"letter": "B", "text": "越大，越小"}, {"letter": "C", "text": "越小，越大"}, {"letter": "D", "text": "不变，越小"}], "answer": "A", "explanation": "", "answers": []}, {"id": 246, "type": "choice", "label": "单选题", "number": 1, "chapter": "第二章改", "stem": "航空公司运行中，对于飞行员操作来讲，起飞时最为重要的三个起飞关键速度是（ ）。", "options": [{"letter": "A", "text": "V1 / VR /V2"}, {"letter": "B", "text": "V1 / VMCG / VMCA"}, {"letter": "C", "text": "V1 / VLOF /V2"}, {"letter": "D", "text": "VEF / VLOF / VTIRE"}], "answer": "A", "explanation": "", "answers": []}, {"id": 247, "type": "choice", "label": "单选题", "number": 2, "chapter": "第二章改", "stem": "大型运输机起飞场道阶段是指飞机从地面开始加速滑跑到飞机离地高度（ ）ft，速度不小于（ ）的过程", "options": [{"letter": "A", "text": "50，V2"}, {"letter": "B", "text": "500，1.3Vs"}, {"letter": "C", "text": "35，V2"}, {"letter": "D", "text": "50，1.3Vs"}], "answer": "C", "explanation": "", "answers": []}, {"id": 248, "type": "choice", "label": "单选题", "number": 3, "chapter": "第二章改", "stem": "起飞速度V1是申请人选定的起飞决断速度，一般以（ ）表示。", "options": [{"letter": "A", "text": "TAS"}, {"letter": "B", "text": "CAS"}, {"letter": "C", "text": "IAS"}, {"letter": "D", "text": "EAS"}], "answer": "B", "explanation": "", "answers": []}, {"id": 249, "type": "choice", "label": "单选题", "number": 4, "chapter": "第二章改", "stem": "双发飞机起飞地面滑跑阶段若发生一发失效，例如右发故障停车，将使飞机向（ ）偏转，此时飞行员需要蹬（ ）舵进行修正，使飞机沿跑道中心线直线滑跑。", "options": [{"letter": "A", "text": "左，左"}, {"letter": "B", "text": "左，右"}, {"letter": "C", "text": "右，左"}, {"letter": "D", "text": "右，右"}], "answer": "C", "explanation": "双发飞机起飞滑跑时，突然右发失效，则右侧发动机推力丧失，使得飞机左右推力不平衡，使得飞机机头右侧偏，此时飞行员必须及时蹬左舵进行修正（前提是飞机速度大于VMCG）。", "answers": []}, {"id": 250, "type": "choice", "label": "单选题", "number": 5, "chapter": "第二章改", "stem": "只有当一发停车时地面滑跑的速度（ ）地面最小操纵速度VMCG，才能有效制止一发失效产生的机头偏转，才能安全地继续起飞。", "options": [{"letter": "A", "text": "大于"}, {"letter": "B", "text": "小于"}, {"letter": "C", "text": "等于"}, {"letter": "D", "text": "以上均可"}], "answer": "A", "explanation": "", "answers": []}, {"id": 251, "type": "choice", "label": "单选题", "number": 6, "chapter": "第二章改", "stem": "关于双发涡扇运输机的VMCG，下列说法正确的是：", "options": [{"letter": "A", "text": "在起飞滑跑过程中，如果在速度小于VMCG时突发一发失效，飞行员可以继续使用剩余的正常工作发动机使飞机加速，待速度超过VMCG之后，再做中断起飞或继续起飞的决策"}, {"letter": "B", "text": "在起飞滑跑过程中，如果在速度小于VMCG时突发一发失效，飞行员必须中断起飞，没有其他选择"}, {"letter": "C", "text": "在起飞滑跑过程中，如果在速度大于VMCG时突发一发失效，飞行员必须中断起飞，没有其他选择"}, {"letter": "D", "text": "在起飞滑跑过程中，如果在速度大于VMCG时突发一发失效，飞行员必须选择继续起飞，没有其他选择"}], "answer": "B", "explanation": "", "answers": []}, {"id": 252, "type": "choice", "label": "单选题", "number": 7, "chapter": "第二章改", "stem": "同一架飞机在相同机场条件下进行起飞滑跑时的发动机功率越大，则地面操纵最小速度VMCG如何变化？", "options": [{"letter": "A", "text": "VMCG将增大"}, {"letter": "B", "text": "VMCG将减小"}, {"letter": "C", "text": "VMCG将不发生变化"}, {"letter": "D", "text": "VMCG变化主要取决于飞机的实际起飞重量变化"}], "answer": "A", "explanation": "", "answers": []}, {"id": 253, "type": "choice", "label": "单选题", "number": 8, "chapter": "第二章改", "stem": "飞机重量越重，则地面最小操纵速度VMCG（ ）。", "options": [{"letter": "A", "text": "越大"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "不能确定"}, {"letter": "D", "text": "与飞机重量无关"}], "answer": "B", "explanation": "", "answers": []}, {"id": 254, "type": "choice", "label": "单选题", "number": 9, "chapter": "第二章改", "stem": "发动机越靠外侧安装，则地面最小操纵速度VMCG（ ）。", "options": [{"letter": "A", "text": "越大"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "与发动机位置无关"}, {"letter": "D", "text": "不能确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 255, "type": "choice", "label": "单选题", "number": 10, "chapter": "第二章改", "stem": "机场气温和标高越高，则地面最小操纵速度VMCG（ ）。", "options": [{"letter": "A", "text": "越大"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "不能确定"}, {"letter": "D", "text": "与机场气温标高无关"}], "answer": "B", "explanation": "", "answers": []}, {"id": 256, "type": "choice", "label": "单选题", "number": 11, "chapter": "第二章改", "stem": "飞机重心越靠后，则空中最小操纵速度VMCA（ ）。", "options": [{"letter": "A", "text": "越大"}, {"letter": "B", "text": "越小"}, {"letter": "C", "text": "不能确定"}, {"letter": "D", "text": "与飞机重心位置无关"}], "answer": "A", "explanation": "现代民航运输机空中飞行时如果发生一发故障，则在不对称推力作用下，飞机会出现向失效发动机一侧偏转，同时由于推力减小会使飞行速度减小，进而升力减小，飞行高度将下降。VMCA是一发停车时，为保证飞机保持坡度不大于5度、航向改变量不大于20度时最小的飞行速度，即维持一个最大的蹬舵操纵力矩时(方向舵偏转角已达到最大)的最小飞行速度。当重心后移时，要维持或达到这个蹬舵力矩，就必须要有一个更大气动力，因此力臂小了(方向舵在重心之后)，而更大的气动力就需要更大的飞行速度，因此所带来的后果就是最小操纵速度VMCA增大，即，飞机速度只有达到更大一些的VMCA，才能保证飞机的坡度和航向。", "answers": []}, {"id": 257, "type": "choice", "label": "单选题", "number": 12, "chapter": "第二章改", "stem": "对双发涡扇大型运输机，全发起飞时的最小离地速度VMU(N)与单发失效继续起飞时的最小离地速度VMU(N-1)之间的大小关系是：", "options": [{"letter": "A", "text": "VMU(N) < VMU(N-1)"}, {"letter": "B", "text": "VMU(N) > VMU(N-1)"}, {"letter": "C", "text": "VMU(N) = VMU(N-1)"}, {"letter": "D", "text": "两者的大小关系取决于机型以及重心位置等，因此条件不充分，无法确定"}], "answer": "A", "explanation": "", "answers": []}, {"id": 258, "type": "choice", "label": "单选题", "number": 13, "chapter": "第二章改", "stem": "当飞机重心比较靠前时，对最小离地速度VMU的影响是：", "options": [{"letter": "A", "text":
